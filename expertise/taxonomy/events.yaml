# WHAT IS INDEXED, AND WHY NOT EVERYTHING.
# An index is not free: it is a write on every insert and space on disk.
# 45 of the fields were indexed and 26 of them were never filtered by -
# on 170 thousand events that was 107 MB of indexes against 178 MB of
# data, and 45 index writes for every event appended. Indexed now are the
# fields the sections actually select, group and sort by; add index: true
# to a field of your own when you start filtering by it.
name: events
id: LS-T-1
type: taxonomy
version: 1.0.0
title: Event taxonomy (ECS-like)
description: 'The single LiSin event taxonomy. Modelled on ECS (Elastic Common Schema), with flat column
  names (an ECS dot becomes an underscore in SQL). Normalization and correlation rules are written against
  THESE FIELDS - the way sigma rules are written against their own taxonomy. The schema of the events
  table IS BUILT FROM THIS FILE: add a field here and the column appears in the database. Nothing is removed
  automatically (columns are only added).'
key: event_id
table: events
fields:
- name: ts
  ecs: '@timestamp'
  type: text
  index: true
  group: event
  desc: The time of the event (ISO-8601, UTC)
- name: ingested
  ecs: event.ingested
  type: text
  group: event
  desc: When the event landed in the database
- name: event_id
  ecs: event.id
  type: text
  index: true
  group: event
  desc: The unique id of the event (the journal cursor) - the deduplication key
- name: event_kind
  ecs: event.kind
  type: text
  index: true
  group: event
  desc: event | alert | metric | state
- name: event_category
  ecs: event.category
