  index: true
  group: event
  desc: process | network | file | authentication | iam | session | package | driver | configuration |
    intrusion_detection
- name: event_type
  ecs: event.type
  type: text
  index: false
  group: event
  desc: start | end | access | creation | deletion | change | connection | info | denied
- name: event_action
