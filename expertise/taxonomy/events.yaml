name: events
id: LS-T-1
type: taxonomy
version: 1.0.0
title: Event taxonomy (ECS-like)
description: 'Единая таксономия событий LiSin. По образцу ECS (Elastic Common Schema), плоские имена колонок
  (точка ECS → подчёркивание в SQL). Именно ПОД ЭТИ ПОЛЯ пишутся правила нормализации (normalize) и корреляции
  (detection) — как sigma-правила пишутся под свою таксономию. Схема таблицы events СТРОИТСЯ ИЗ ЭТОГО
  ФАЙЛА: добавил поле сюда → колонка появится в БД. Ничего не удаляется автоматически (колонки только
  добавляются).'
key: event_id
table: events
fields:
- name: ts
  ecs: '@timestamp'
  type: text
  index: true
  group: event
  desc: Время события (ISO-8601, UTC)
- name: ingested
