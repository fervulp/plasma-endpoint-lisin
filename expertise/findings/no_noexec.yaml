name: no_noexec
id: LS-FN-7
type: finding
version: 2.0.0
title: Каталоги, доступные на запись, без запрета исполнения
severity: low
source: state
sql: SELECT target, source, fstype, options, CASE WHEN world_writable='yes' THEN 'любой пользователь'
  WHEN user_writable='yes' THEN 'мой пользователь' ELSE '' END AS who FROM mounts WHERE exec_risk='yes'
  AND fstype NOT IN ('proc','sysfs','devtmpfs','cgroup2','securityfs','debugfs','tracefs','configfs','bpf','pstore','fusectl','ramfs','autofs','mqueue','hugetlbfs')
evidence: '{target} ({fstype}) — писать может {who}, исполнение разрешено'
why: 'В каталог, куда может писать непривилегированный пользователь, попадает всё скачанное. Если оттуда
  разрешено исполнение, загруженный файл запускается сразу, без копирования и без прав. Правило не знает
  имён каталогов — оно смотрит на факт: доступен на запись и исполнение не запрещено.'
action: Добавьте noexec (и nosuid,nodev) в опции монтирования тех точек, где это не ломает работу. Проверьте,
  что там сейчас лежит.
explore_table: mounts
explore_col: exec_risk
explore_val: 'yes'
tag: hardening
time_col: ''
basis: mismatch+methodology
reference: 'CIS Benchmark: разделы с пользовательскими данными монтировать с nodev,nosuid,noexec'
