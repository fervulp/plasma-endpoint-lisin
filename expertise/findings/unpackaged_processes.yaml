name: unpackaged_processes
id: LS-FN-5
type: finding
version: 1.0.0
title: Processes outside any package
severity: medium
source: state
sql: SELECT command, user, rss_mb FROM processes WHERE COALESCE(purpose,'')='' AND command NOT LIKE '[%'
  AND command NOT LIKE '(%' AND command <> ''
evidence: '{command}  ({user}, {rss_mb} MB)'
why: 'The package manager does not know these binaries - which means nobody updates them and nobody checks
  their integrity. This is also where malware hides: it almost never comes from a repository.'
action: 'Decide for each one: it is your software (document it) or it is not needed - remove it.'
explore_table: processes
explore_col: purpose
explore_val: ''
tag: software
time_col: ''
basis: mismatch
reference: MITRE ATT&CK T1036 Masquerading - an executable outside the package manager
