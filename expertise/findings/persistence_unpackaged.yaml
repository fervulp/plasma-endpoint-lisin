name: persistence_unpackaged
id: LS-FN-4
type: finding
version: 2.0.0
title: Autostart mechanisms that belong to no package
severity: high
source: state
sql: SELECT vector, path, detail, package FROM persistence WHERE unpackaged='yes' ORDER BY vector, path
evidence: '{vector}: {path}  {detail}'
why: 'The file sits in a system autostart mechanism (preload, ld.so.conf.d, profile.d, udev, systemd
  generators), but no package installed it - so it appeared by hand. The rule does not look for "bad names":
  the name of a mechanism says nothing, these directories are full of legitimate files from packages. What
  is looked for is a MISMATCH: a system path with no owning package.'
action: Look at the contents of the file and recall whether you installed it. If not, remove it and find
  out what created it (the events for this path).
explore_table: persistence
explore_col: unpackaged
explore_val: 'yes'
tag: persistence
time_col: ''
basis: mismatch
reference: MITRE ATT&CK TA0003 Persistence - persistence through the standard loading mechanisms
