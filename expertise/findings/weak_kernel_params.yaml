name: weak_kernel_params
id: LS-FN-6
type: finding
version: 1.0.0
title: Kernel parameters diverge from the configuration
severity: medium
source: state
sql: SELECT param, value, declared, declared_in FROM kernel_params WHERE status='differs'
evidence: '{param} = {value}, declared {declared} in {declared_in}'
why: The value in the kernel differs from what the system itself declared. So it was changed on the fly
  (sysctl -w, an application or malware) - the configuration no longer describes reality.
action: Compare with the source file and run sysctl --system, or explain the divergence.
explore_table: kernel_params
explore_col: status
explore_val: differs
tag: hardening
time_col: ''
basis: mismatch
reference: A divergence from the system's own configuration (sysctl.d)
