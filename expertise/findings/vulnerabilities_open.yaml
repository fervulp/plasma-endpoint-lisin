name: vulnerabilities_open
id: LS-FN-8
type: finding
version: 1.0.0
title: Vulnerabilities with an available patch
severity: high
source: state
sql: SELECT advisory, packages, severity, cvss_score, cvss_rating, issued, action FROM vulnerabilities
  WHERE status='open' ORDER BY CAST(cvss_score AS REAL) DESC
evidence: '{issued}  CVSS {cvss_score} {cvss_rating}  {packages}  ({advisory})'
why: 'A fix has already been released for these packages. An uninstalled patch is the cheapest way in: the
  exploit is public and the window between the advisory and the attack is short.'
action: 'Install the updates: dnf upgrade --security (or a single advisory).'
explore_table: vulnerabilities
explore_col: status
explore_val: open
tag: patch
time_col: issued
basis: methodology
reference: Fedora security advisories + CVSS 3.1 (FIRST)
