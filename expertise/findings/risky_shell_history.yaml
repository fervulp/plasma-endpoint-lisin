name: risky_shell_history
id: LS-FN-9
type: finding
version: 1.0.0
title: Risky commands in the shell history
severity: medium
source: state
sql: SELECT user, shell, command FROM shell_history WHERE command LIKE '%curl%|%sh%' OR command LIKE '%wget%|%sh%'
  OR command LIKE '%chmod 777%' OR command LIKE '%curl%|%bash%'
evidence: '{user}: {command}'
why: Piping a downloaded script straight into an interpreter (curl | sh) executes someone else's code
  unchecked, and chmod 777 opens a file to everyone for writing.
action: Check what exactly was executed and whether it is still in the system.
explore_table: shell_history
explore_col: ''
explore_val: ''
tag: activity
time_col: ''
basis: methodology
reference: MITRE ATT&CK T1105 Ingress Tool Transfer + T1059 Command and Scripting Interpreter
