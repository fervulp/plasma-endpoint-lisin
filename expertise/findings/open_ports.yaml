name: open_ports
id: LS-FN-1
type: finding
version: 1.0.0
title: Ports reachable from the network
severity: high
source: state
sql: SELECT local, proto, process, service, service_purpose FROM ports WHERE exposure LIKE 'OPEN%' AND
  remote=''
evidence: '{local} {proto}  {process} {service}'
why: 'A port open to the outside is an entry point. Every one of them must be justified: if a service is
  only needed locally, it must not be exposed.'
action: Check whether outside access is needed. If not, close it in firewalld or bind the service to 127.0.0.1.
explore_table: ports
explore_col: exposure
explore_val: OPEN (exposed)
tag: network
time_col: ''
basis: methodology
reference: 'CIS Benchmark: services should not listen on 0.0.0.0 without a need'
