name: privesc_vectors
id: LS-FN-2
type: finding
version: 1.0.0
title: Privilege escalation vectors
severity: high
source: state
sql: SELECT kind, name, detail, changed, age_days FROM privesc WHERE risk='high' ORDER BY changed DESC
evidence: '{changed}  {kind}: {name} {detail}'
why: 'File capabilities and passwordless sudo give root without typing a password. This is the first thing
  an attacker looks for after gaining a foothold as an ordinary user. When the vector appeared matters:
  a fresh one next to an incident is a lead.'
action: Remove capabilities you do not need (setcap -r) and NOPASSWD rules that are not justified.
explore_table: privesc
explore_col: risk
explore_val: high
tag: privesc
time_col: changed
basis: mismatch
reference: MITRE ATT&CK TA0004 Privilege Escalation
