name: browser_ext_origin
id: LS-FN-10
type: finding
version: 1.0.0
title: Browser extensions with a questionable origin
severity: high
source: state
sql: SELECT browser, name, origin, source_url, permissions, installed FROM browser_extensions WHERE from_temp='yes'
  OR (all_sites='yes' AND origin NOT IN ('store','system'))
evidence: '{installed}  {browser}: {name} ({origin}) permissions: {permissions}  from {source_url}'
why: 'An extension runs on EVERY page you open and sees what you see: the content, the cookies, the passwords
  you type. An install from a temporary directory while the origin is declared as a system one is not how
  standard add-ons are installed.'
action: 'Open the extensions page and check every one: did you install it yourself. Remove anything unfamiliar
  and change your passwords on the sites where you are logged in.'
explore_table: browser_extensions
explore_col: from_temp
explore_val: 'yes'
tag: browser
time_col: installed
basis: mismatch
reference: MITRE ATT&CK T1176 Browser Extensions
