name: auth_bruteforce
id: LS-C-2
type: detection
version: 1.0.0
title: Серия неудачных аутентификаций
severity: high
tactic: credential_access
technique: T1110
category: authentication
enabled: true
# Одна неудачная попытка — опечатка. Пять за пять минут от одного субъекта —
# подбор пароля или сломанный автоматизированный клиент. И то и другое нужно
# увидеть.
where: "event_category = 'authentication' AND event_outcome = 'failure'"
group_by: [subject_name]
threshold: 5
window: 300
message: "{count} неудачных аутентификаций подряд у {subject_name}"
