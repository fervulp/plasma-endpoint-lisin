name: external_beacon
id: LS-C-4
type: detection
version: 1.0.0
title: Частые обращения к одному внешнему адресу
severity: medium
tactic: command_and_control
technique: T1071
category: network
enabled: true
# Управляющий сервер опрашивают регулярно и помногу. Много соединений к
# ОДНОМУ внешнему адресу за короткое окно — повод посмотреть, кто это делает
# и что за адрес (ASN уже проставлен обогащением).
where: >-
  event_category = 'network' AND event_action = 'connection_opened'
  AND network_direction = 'external'
group_by: [destination_ip]
threshold: 20
window: 300
message: "{count} соединений к внешнему адресу {destination_ip} за 5 минут"
