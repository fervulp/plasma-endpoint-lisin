name: c2_contact
id: LS-C-5
type: detection
version: 1.0.0
title: Соединение с адресом из фида угроз
severity: critical
tactic: command_and_control
technique: T1071
category: intrusion_detection
enabled: true
# Совпадение адреса назначения со списком активных C2 — не догадка, а факт из
# внешнего фида. Порог 1: одно такое соединение уже требует разбора.
where: "COALESCE(threat_indicator,'') <> ''"
group_by: [destination_ip, threat_indicator]
threshold: 1
window: 3600
message: "Обращение к {destination_ip} — адрес числится в фиде ({threat_indicator})"
