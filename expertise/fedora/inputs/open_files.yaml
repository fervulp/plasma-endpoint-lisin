name: open_files
id: LS-I-58
type: input
version: 1.0.0
title: Files open right now
command: "python3 - <<'PYFD'\nimport os\n# WHAT PROCESSES HOLD OPEN RIGHT NOW. Read from /proc/<pid>/fd,\
  \ without root -\n# everything that belongs to our user is visible.\n# readlink, not parsing `ls -l`:\
  \ paths contain spaces and parentheses\n# (\"profile.Default (release)/places.sqlite\"), and field parsing\
  \ broke them.\nfor pid in sorted(os.listdir(\"/proc\")):\n    if not pid.isdigit():\n        continue\n\
  \    d = \"/proc/%s/fd\" % pid\n    try:\n        names = os.listdir(d)\n    except OSError:\n     \
  \   continue\n    try:\n        with open(\"/proc/%s/comm\" % pid) as f:\n            comm = f.read().strip()\n\
  \    except OSError:\n        comm = \"\"\n    for n in names:\n        try:\n            t = os.readlink(os.path.join(d,\
  \ n))\n        except OSError:\n            continue\n        print(\"\\t\".join([pid, comm, n, t.replace(\"\
  \\t\", \" \")]))\nPYFD\n"
interval: 60
enabled: true
