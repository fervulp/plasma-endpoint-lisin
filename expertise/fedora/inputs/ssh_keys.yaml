name: ssh_keys
id: LS-I-25
type: input
version: 1.0.0
title: SSH keys
command: |
  for f in "$HOME"/.ssh/*.pub "$HOME"/.ssh/authorized_keys /etc/ssh/*.pub; do
    [ -r "$f" ] || continue
    while IFS= read -r line; do
      [ -n "$line" ] && printf '%s\t%s\n' "$f" "$line"
    done < "$f"
  done
  # private keys - only the fact that they exist, without the content
  for f in "$HOME"/.ssh/id_* /etc/ssh/ssh_host_*_key; do
    case "$f" in *.pub) continue;; esac
    [ -f "$f" ] && printf '%s\tPRIVATE\n' "$f"
  done
  true
