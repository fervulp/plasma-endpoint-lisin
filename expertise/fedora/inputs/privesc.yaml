name: privesc
id: LS-I-39
type: input
version: 1.1.0
title: Privilege escalation surface
# Privilege escalation vectors available to a normal user:
#  - file capabilities (getcap): cap_setuid/cap_dac_override/... = privesc;
#  - sudo -n -l: sudo rights without a password prompt (NOPASSWD/cache) - a strong signal;
#  - /etc/sudoers[.d]: the rule lines, if the file is readable (usually root only -
#    then it is silently empty, like hardware/audit).
#
# THE TIME (the MTIME section): it is not enough for an analyst to know WHAT can
# be used to escalate - they need to know WHEN this vector appeared. A fresh
# cap_setuid or a NOPASSWD rule close in time to an incident is a lead, while the
# same vector from two years ago is a routine system setting.
# We take the mtime of the carrier of the vector itself (the binary with the capability, the sudoers file).
command: |
  echo "===CAPS==="
  caps=$(getcap -r /usr /opt "$HOME/.local" 2>/dev/null)
  printf '%s\n' "$caps"
  echo "===SUDO==="
  sudo -n -l 2>/dev/null
  echo "===SUDOERS==="
  for f in /etc/sudoers /etc/sudoers.d/*; do
    [ -r "$f" ] || continue
    while IFS= read -r line; do
      case "$line" in ''|\#*) ;; *) printf '%s\t%s\n' "$f" "$line";; esac
    done < "$f"
  done
  echo "===MTIME==="
  { printf '%s\n' "$caps" | sed 's/ =.*//; s/ [a-z_+,=ep]*$//'
    ls -1 /etc/sudoers /etc/sudoers.d/* 2>/dev/null; } | sort -u |
  while IFS= read -r pth; do
    [ -n "$pth" ] && [ -e "$pth" ] && stat --printf='%y\t%n\n' "$pth" 2>/dev/null
  done
  true
interval: 300
enabled: true
