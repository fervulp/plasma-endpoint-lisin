name: boot_sessions
id: LS-I-56
type: input
version: 1.0.0
title: System startups
# WHEN THE SYSTEM WAS TURNED ON. journalctl --list-boots knows the boundaries of
# every boot (the boot id + the first and the last record), and wtmp
# (`last reboot`) remembers the reboots even where the journal was trimmed.
# Works without root.
command: |
  journalctl --list-boots --no-pager -o short-iso 2>/dev/null | sed 's/^/boot\t/'
  echo "===WTMP==="
  last -x -n 50 --time-format iso reboot shutdown 2>/dev/null
  echo "===NOW==="
  printf 'uptime_since\t%s\n' "$(uptime -s 2>/dev/null)"
  printf 'current_boot_id\t%s\n' "$(cat /proc/sys/kernel/random/boot_id 2>/dev/null)"
interval: 600
enabled: true
