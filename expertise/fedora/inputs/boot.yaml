name: boot
id: LS-I-31
type: input
version: 1.0.0
title: Boot & mitigations
command: |
  printf 'cmdline\t%s\n' "$(cat /proc/cmdline 2>/dev/null)"
  for f in /sys/devices/system/cpu/vulnerabilities/*; do
    [ -r "$f" ] && printf 'mitigation:%s\t%s\n' "$(basename "$f")" "$(cat "$f" 2>/dev/null)"
  done
  printf 'secure_boot\t%s\n' "$(mokutil --sb-state 2>/dev/null | head -1)"
  printf 'lockdown\t%s\n' "$(cat /sys/kernel/security/lockdown 2>/dev/null)"
interval: 600
enabled: true
