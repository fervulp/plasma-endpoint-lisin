name: journal
id: LS-I-40
type: input
version: 1.0.0
title: System journal (events + kernel audit)
# EVENTS "from the very bottom of the system": journald returns not only syslog
# but also records of the KERNEL AUDIT subsystem (_TRANSPORT=audit) -
# SYSCALL/SOCKADDR/PROCTITLE/PATH. That gives exec events and network connect()
# at the system call level WITHOUT root (membership in wheel/systemd-journal is
# enough; /var/log/audit/audit.log cannot be read at the same time).
#
# The window has a MARGIN (70 s at an interval of 60 s): there will be no
# duplicates - the events output deduplicates by event_id (UNIQUE + INSERT OR
# IGNORE), so no cursor has to be stored on disk and nothing is missed on restart.
command: journalctl -o json --no-pager --since "-70 seconds" -n 5000 2>/dev/null
interval: 60
enabled: true
