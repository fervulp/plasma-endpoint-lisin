name: dev_packages
id: LS-I-28
type: input
version: 2.0.0
title: Language packages
command: "# the application runs with PYTHONNOUSERSITE=1 - we unset it, otherwise pip hides the user site\n\
  unset PYTHONNOUSERSITE\nif command -v pip >/dev/null 2>&1; then\n  names=$(pip list --format=freeze\
  \ 2>/dev/null | cut -d= -f1 | tr '\\n' ' ')\n  pip show $names 2>/dev/null | awk '\n    function flush(){\
  \ if(n!=\"\"){ if(s==\"UNKNOWN\")s=\"\"; printf \"pip\\t%s\\t%s\\t%s\\n\",n,v,s } n=\"\";v=\"\";s=\"\
  \" }\n    /^Name: /{ flush(); n=substr($0,7) }\n    /^Version: /{ v=substr($0,10) }\n    /^Summary:\
  \ /{ s=substr($0,10) }\n    END{ flush() }'\nfi\nif command -v pipx >/dev/null 2>&1; then\n  pipx list\
  \ --short 2>/dev/null | awk 'NF{printf \"pipx\\t%s\\t%s\\t\\n\",$1,$2}'\nfi\nif command -v cargo >/dev/null\
  \ 2>&1; then\n  cargo install --list 2>/dev/null | \\\n    awk '/^[^ ].*:$/{gsub(/:$/,\"\");printf \"\
  cargo\\t%s\\t%s\\t\\n\",$1,$2}'\nfi\nif command -v npm >/dev/null 2>&1; then\n  npm ls -g --depth=0\
  \ --json --long 2>/dev/null | python3 -c 'import json,sys; d=json.load(sys.stdin); [print(\"npm\\t%s\\\
  t%s\\t%s\"%(n,i.get(\"version\",\"\"),(i.get(\"description\") or \"\").replace(chr(9),\" \").replace(chr(10),\"\
  \ \"))) for n,i in (d.get(\"dependencies\") or {}).items()]' 2>/dev/null\nfi\nif command -v gem >/dev/null\
  \ 2>&1; then\n  gem list --local 2>/dev/null | \\\n    sed -E 's/^([^ ]+) \\(([^,)]+).*/gem\\t\\1\\\
  t\\2\\t/'\nfi\nif command -v go >/dev/null 2>&1; then\n  gb=\"$(go env GOPATH 2>/dev/null)/bin\"\n \
  \ [ -d \"$gb\" ] && for f in \"$gb\"/*; do\n    [ -x \"$f\" ] || continue\n    v=$(go version -m \"\
  $f\" 2>/dev/null | awk '/^\\tmod\\t/{print $4; exit}')\n    printf 'go\\t%s\\t%s\\t\\n' \"$(basename\
  \ \"$f\")\" \"$v\"\n  done\nfi\ntrue\n"
interval: 600
enabled: true
