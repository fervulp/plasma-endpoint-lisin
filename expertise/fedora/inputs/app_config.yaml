name: app_config
id: LS-I-60
type: input
version: 1.0.0
title: Where application configs live
# WHERE THE CONFIGURATION OF APPLICATIONS LIVES - two sources, both from the system:
#  * system ones: rpm marks the files with the %config flag itself - thousands of
#    files from hundreds of packages in one second, nothing has to be guessed;
#  * user ones: the XDG standard - the application directory in ~/.config and
#    ~/.local/share. The directory name is the binding to the program.
# No lists of "where configs usually live" from me.
command: |
  echo "===RPM==="
  # IMPORTANT: inside an array iteration [...] the package name is taken as
  # %{=NAME} - a plain %{NAME} is not expanded and returns a couple of rows instead of thousands.
  rpm -qa --qf '[%{=NAME}\t%{FILENAMES}\t%{FILEFLAGS:fflags}\n]' 2>/dev/null |
    awk -F'\t' '$3 ~ /c/ {print $1"\t"$2}'
  echo "===USER==="
  python3 - <<'PYU'
  import os
  # USER CONFIGS by the XDG standard: the application directory in ~/.config is
  # exactly "where the configuration of this application lives".
  # The directory name is the binding to the program, no lists are needed.
  home = os.path.expanduser("~")
  roots = [(os.path.join(home, ".config"), "XDG_CONFIG_HOME"),
           (os.path.join(home, ".local/share"), "XDG_DATA_HOME")]
  for root, origin in roots:
      if not os.path.isdir(root):
          continue
      for name in sorted(os.listdir(root)):
          p = os.path.join(root, name)
          try:
              st = os.stat(p)
          except OSError:
              continue
          app = name
          if os.path.isdir(p):
              n = 0
              for _r, _d, _f in os.walk(p):
                  n += len(_f)
                  if n > 500:
                      break
              print("\t".join([app, p, "directory", str(n), origin,
                               str(int(st.st_mtime))]))
          else:
              app = name.lstrip(".").split(".")[0]
              print("\t".join([app, p, "file", "1", origin,
                               str(int(st.st_mtime))]))
  PYU
interval: 3600
enabled: true
