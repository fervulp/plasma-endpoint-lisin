name: app_config
id: LS-I-60
type: input
version: 1.0.0
title: Where application configs live
# ГДЕ ЛЕЖИТ КОНФИГУРАЦИЯ ПРИЛОЖЕНИЙ — два источника, оба системные:
#  * системные: rpm сам помечает файлы флагом %config — 2756 файлов от 390
#    пакетов за 1 секунду, ничего угадывать не нужно;
#  * пользовательские: стандарт XDG — каталог приложения в ~/.config и
#    ~/.local/share. Имя каталога и есть привязка к программе.
# Никаких списков «где обычно лежат конфиги» от меня.
command: |
  echo "===RPM==="
  # ВАЖНО: внутри итерации по массиву [...] имя пакета берётся как %{=NAME} —
  # обычный %{NAME} не разворачивается и отдаёт лишь пару строк вместо тысяч.
  rpm -qa --qf '[%{=NAME}\t%{FILENAMES}\t%{FILEFLAGS:fflags}\n]' 2>/dev/null |
    awk -F'\t' '$3 ~ /c/ {print $1"\t"$2}'
  echo "===USER==="
  python3 - <<'PYU'
  import os
  # ПОЛЬЗОВАТЕЛЬСКИЕ КОНФИГИ по стандарту XDG: каталог приложения в
  # ~/.config — это и есть «где лежит конфигурация этого приложения».
  # Имя каталога и есть привязка к программе, никаких списков не нужно.
  home = os.path.expanduser("~")
  roots = [(os.path.join(home, ".config"), "XDG_CONFIG_HOME"),
           (os.path.join(home, ".local/share"), "XDG_DATA_HOME")]
  for root, origin in roots:
      if not os.path.isdir(root):
          continue
      for name in sorted(os.listdir(root)):
          p = os.path.join(root, name)
          try:
              st = os.stat(p)
          except OSError:
              continue
          app = name
          if os.path.isdir(p):
              n = 0
              for _r, _d, _f in os.walk(p):
                  n += len(_f)
                  if n > 500:
                      break
              print("\t".join([app, p, "каталог", str(n), origin,
                               str(int(st.st_mtime))]))
          else:
              app = name.lstrip(".").split(".")[0]
              print("\t".join([app, p, "файл", "1", origin,
                               str(int(st.st_mtime))]))
  PYU
interval: 3600
enabled: true
