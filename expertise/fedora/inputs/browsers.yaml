name: browsers
id: LS-I-57
type: input
version: 1.0.0
title: Browser profiles, extensions and history
# BROWSERS ARE FOUND THROUGH THE SYSTEM, NOT FROM A LIST OF NAMES.
#  * what counts as a browser is decided by the system itself: a desktop entry
#    that declares itself a handler of x-scheme-handler/http;
#  * where the profiles are is found from TRACES ON DISK: a directory with
#    places.sqlite (the Mozilla family) or with History/Secure Preferences (the Chromium family).
# Verified on a live machine: this found profiles that no list of names would
# have contained, including a Chromium inside another application's directory.
# A profile without a desktop entry is marked: the browser was installed
# outside the system, and that alone is a reason to look.
#
# The databases are copied before reading: a running browser keeps them locked.
# Extensions: Mozilla uses extensions.json, Chromium uses Secure Preferences
# (which also holds the state, the store flag and the installation date).
command: |
  python3 - <<'PYBROWSERS'
  import json, os, shutil, sqlite3, subprocess, tempfile, time
  from pathlib import Path

  HOME = Path.home()
  SKIP = {"node_modules", ".git", ".cache", "Trash", ".local/share/Trash"}

  def desktop_browsers():
      """Browsers = desktop entries that declared themselves http handlers.

      That is exactly how the system itself decides a program is a browser. A list
      of names ("firefox, chrome, ...") would go stale on the first unfamiliar build.
      """
      out = {}
      dirs = ["/usr/share/applications", str(HOME / ".local/share/applications"),
              "/var/lib/flatpak/exports/share/applications",
              str(HOME / ".local/share/flatpak/exports/share/applications")]
      for d in dirs:
          p = Path(d)
          if not p.is_dir():
              continue
          for f in p.glob("*.desktop"):
              try:
                  t = f.read_text(errors="replace")
              except OSError:
                  continue
              if "x-scheme-handler/http" not in t:
                  continue
              name, ex = f.stem, ""
              for ln in t.splitlines():
                  if ln.startswith("Name=") and name == f.stem:
                      name = ln[5:].strip()
                  elif ln.startswith("Exec="):
                      ex = ln[5:].strip()
              out[f.stem] = {"name": name, "exec": ex}
      return out

  def profiles():
      """Profiles are found from TRACES ON DISK, not from directory names."""
      found = []
      try:
          r = subprocess.run(
              ["find", str(HOME), "-maxdepth", "6", "-type", "d",
               "-name", "node_modules", "-o", "-name", ".git",
               "-o", "-name", ".cache", "-prune", "-o",
               "-name", "places.sqlite", "-print",
               "-o", "-name", "Secure Preferences", "-print",
               "-o", "-name", "Preferences", "-print"],
              capture_output=True, text=True, timeout=60)
          lines = r.stdout.splitlines()
      except Exception:
          lines = []
      seen = set()
      for ln in lines:
          p = Path(ln)
          d = p.parent
          if str(d) in seen:
              continue
          if p.name == "places.sqlite":
              seen.add(str(d)); found.append((d, "mozilla"))
          elif (d / "History").exists() or (d / "Extensions").is_dir():
              seen.add(str(d)); found.append((d, "chromium"))
      return found

  def owner(prof: Path, browsers: dict) -> str:
      """Whose profile this is. The owning directory is the PARENT of the profile:
      every family uses <browser directory>/<profile>. Then we try to match it with
      a desktop entry to show a human name. A profile without an entry is a signal
      in itself: the browser was installed outside the system.
      """
      tok = prof.parent.name.lstrip(".") or prof.name.lstrip(".")
      low = tok.lower()
      for key, b in browsers.items():
          ex = (b["exec"].split() or [""])[0].rsplit("/", 1)[-1].lower()
          for cand in (ex, key.lower()):
              if cand and (low in cand or cand in low):
                  return b["name"]
      return tok + " (no desktop entry)"


  def read_db(path: Path, sql: str, limit_note=""):
      """Copy the database before reading: a live browser keeps it locked."""
      if not path.exists():
          return []
      tmp = Path(tempfile.mkdtemp()) / path.name
      try:
          shutil.copy2(path, tmp)
          for suf in ("-wal", "-shm"):
              s = Path(str(path) + suf)
              if s.exists():
                  shutil.copy2(s, str(tmp) + suf)
          con = sqlite3.connect("file:%s?mode=ro" % tmp, uri=True)
          rows = con.execute(sql).fetchall()
          con.close()
          return rows
      except Exception:
          return []
      finally:
          shutil.rmtree(tmp.parent, ignore_errors=True)

  def tsv(*f):
      print("\t".join(str(x).replace("\t", " ").replace("\n", " ")[:400] for x in f))

  def moz_ext(prof, bname):
      f = prof / "extensions.json"
      try:
          d = json.loads(f.read_text(errors="replace"))
      except Exception:
          return
      for a in d.get("addons") or []:
          loc = a.get("defaultLocale") or {}
          perms = a.get("userPermissions") or {}
          src = a.get("sourceURI") or ""
          st = "store" if "addons.mozilla.org" in src else (
              "system" if str(a.get("location", "")).startswith("app-") else
              ("sideloaded" if src else "unknown"))
          inst = a.get("installDate") or 0
          when = time.strftime("%Y-%m-%d", time.localtime(inst / 1000)) if inst else ""
          tsv("EXT", bname, prof.name, "mozilla", a.get("id", ""),
              loc.get("name", ""), a.get("version", ""),
              "" if a.get("userDisabled") else "yes",
              a.get("type", ""), st, when,
              ",".join(perms.get("permissions") or []),
              ",".join(perms.get("origins") or []), src, str(prof))

  def chr_ext(prof, bname):
      settings = {}
      for pf in ("Secure Preferences", "Preferences"):
          try:
              d = json.loads((prof / pf).read_text(errors="replace"))
          except Exception:
              continue
          for k, v in ((d.get("extensions") or {}).get("settings") or {}).items():
              settings.setdefault(k, v)
      for eid, v in settings.items():
          man = v.get("manifest") or {}
          name = man.get("name", "")
          if name.startswith("__MSG_"):
              key = name[6:-2] if name.endswith("__") else name[6:]
              for loc in (man.get("default_locale") or "en", "en", "en_US"):
                  mf = prof / "Extensions" / eid / str(man.get("version", "")) \
                       / "_locales" / loc / "messages.json"
                  try:
                      msgs = json.loads(mf.read_text(errors="replace"))
                      name = (msgs.get(key) or {}).get("message", name)
                      break
                  except Exception:
                      continue
          it = v.get("install_time") or v.get("first_install_time") or 0
          when = ""
          try:
              # Chromium stores time in microseconds since 1601
              when = time.strftime("%Y-%m-%d", time.localtime(int(it) / 1e6 - 11644473600))
          except Exception:
              pass
          st = "store" if v.get("from_webstore") else (
              "system" if v.get("was_installed_by_default") else "sideloaded")
          perms = (man.get("permissions") or []) + (v.get("granted_permissions", {})
                                                    .get("api") or [])
          origins = (man.get("host_permissions") or []) + (
              v.get("granted_permissions", {}).get("explicit_host") or [])
          tsv("EXT", bname, prof.name, "chromium", eid, name,
              man.get("version", ""), "yes" if v.get("state") == 1 else "",
              man.get("manifest_version", ""), st, when,
              ",".join(str(x) for x in perms), ",".join(str(x) for x in origins),
              v.get("update_url", ""), str(prof))

  def moz_hist(prof, bname):
      q = ("SELECT p.url, p.title, p.visit_count, "
           "datetime(p.last_visit_date/1000000,'unixepoch','localtime') "
           "FROM moz_places p WHERE p.last_visit_date IS NOT NULL "
           "ORDER BY p.last_visit_date DESC LIMIT 400")
      for url, title, vc, when in read_db(prof / "places.sqlite", q):
          tsv("HIST", bname, prof.name, url or "", title or "", vc or 0, when or "")

  def chr_hist(prof, bname):
      q = ("SELECT url, title, visit_count, "
           "datetime(last_visit_time/1000000-11644473600,'unixepoch','localtime') "
           "FROM urls WHERE last_visit_time > 0 "
           "ORDER BY last_visit_time DESC LIMIT 400")
      for url, title, vc, when in read_db(prof / "History", q):
          tsv("HIST", bname, prof.name, url or "", title or "", vc or 0, when or "")

  br = desktop_browsers()
  for prof, kind in profiles():
      bname = owner(prof, br)
      if kind == "mozilla":
          moz_ext(prof, bname); moz_hist(prof, bname)
      else:
          chr_ext(prof, bname); chr_hist(prof, bname)
  PYBROWSERS
interval: 3600
enabled: true
