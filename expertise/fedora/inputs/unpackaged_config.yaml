name: unpackaged_config
id: LS-I-59
type: input
version: 1.0.0
title: Config files not owned by any package
# Walking /etc and comparing with the rpm database: which configuration files were
# added BYPASSING the package manager. Nobody compares such a file with a
# reference and nobody updates it, and if it is also owned by an ordinary user it
# influences the behaviour of the service that reads it.
command: |
  python3 - <<'PYCONF'
  import os, subprocess
  # CONFIGURATION FILES THAT ARE IN NO PACKAGE.
  # The package manager knows every file of its own. Everything that lies in /etc
  # and belongs to NO package was added by hand - and those are the interesting
  # ones: nobody checks their integrity and nobody updates them.
  # Plus the permissions: a SERVICE config writable by an ordinary user is an
  # opportunity to influence what the service does.
  owned = set()
  try:
      out = subprocess.run(["rpm", "-qa", "--qf", "[%{FILENAMES}\n]"],
                           capture_output=True, text=True, timeout=180).stdout
      owned = set(out.splitlines())
  except Exception:
      pass

  for root, dirs, files in os.walk("/etc"):
      dirs[:] = [d for d in dirs if d not in ("ssl", "pki", "ca-certificates")]
      if root.count("/") > 4:
          dirs[:] = []
      for n in files:
          p = os.path.join(root, n)
          if p in owned:
              continue
          try:
              st = os.stat(p)
          except OSError:
              continue
          try:
              import pwd, grp
              u = pwd.getpwuid(st.st_uid).pw_name
              g = grp.getgrgid(st.st_gid).gr_name
          except (KeyError, ImportError):
              u, g = str(st.st_uid), str(st.st_gid)
          mode = oct(st.st_mode & 0o777)[2:]
          print("\t".join([p, u, g, mode, str(int(st.st_mtime))]))
  PYCONF
interval: 3600
enabled: true
