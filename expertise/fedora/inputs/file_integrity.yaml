name: file_integrity
id: LS-I-43
type: input
version: 1.0.0
title: File integrity (rpm verify)
# FILE INTEGRITY without root and without audit rules: rpm compares the installed
# files with the reference from the package database (size, checksum, permissions,
# owner, mtime, capabilities). We limit ourselves to configs (--configfiles): a
# full check hashes every file of the system and takes minutes, while the configs
# are checked in a fraction of a second and they are the interesting ones.
command: rpm -Va --configfiles --nodeps --noscripts 2>/dev/null
interval: 900
enabled: true
