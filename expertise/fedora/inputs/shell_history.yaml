name: shell_history
id: LS-I-26
type: input
version: 1.0.0
title: Shell history
# История команд ВСЕХ пользователей (root + /home/*). bash и zsh.
# Читаем что доступно (root/чужие — только с правами); недоступное молча
# пропускаем. Формат строки: user<TAB>shell<TAB>lineno<TAB>raw.
command: |
  emit() {
    [ -r "$3" ] || return
    tail -n 500 "$3" 2>/dev/null | awk -v u="$1" -v s="$2" \
      'NF{printf "%s\t%s\t%d\t%s\n", u, s, NR, $0}'
  }
  emit root bash /root/.bash_history
  emit root zsh  /root/.zsh_history
  for d in /home/*; do
    [ -d "$d" ] || continue
    us=$(basename "$d")
    emit "$us" bash "$d/.bash_history"
    emit "$us" zsh  "$d/.zsh_history"
  done
  true
interval: 120
enabled: true
