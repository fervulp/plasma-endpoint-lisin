name: net_events
id: LS-I-44
type: input
version: 1.0.0
title: Network connection events (socket diff)
# СЕТЕВЫЕ СОБЫТИЯ: снимок сокетов сравнивается с предыдущим — появившиеся и
# исчезнувшие соединения становятся событиями. Аудит ядра даёт connect() лишь
# при своём правиле и без объёмов; здесь видно ЛЮБОЕ соединение процесса,
# включая входящие, без root. Ограничение то же, что у procmon: соединение
# короче интервала будет пропущено.
command: ss -tunaOpn 2>/dev/null
interval: 20
enabled: true
