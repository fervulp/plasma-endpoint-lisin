name: pkg_events
id: LS-I-41
type: input
version: 1.0.0
title: Package install/update events (rpmdb)
# ВТОРАЯ точка входа для событий — принципиально другой источник (rpmdb,
# не журнал). Доказывает главное свойство: события со ВСЕХ точек входа
# сходятся в ОДНО окно, потому что нормализация приводит их к одной
# таксономии. Формат: epoch<TAB>имя<TAB>версия.
command: rpm -qa --qf '%{INSTALLTIME}\t%{NAME}\t%{VERSION}-%{RELEASE}\n' 2>/dev/null | sort -rn | head -300
interval: 900
enabled: true
