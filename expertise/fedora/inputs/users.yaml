name: users
id: LS-I-5
type: input
version: 2.0.0
title: Users
command: |
  who > /tmp/.lisin_who 2>/dev/null
  getent passwd | while IFS=: read -r name x uid gid gecos home shell; do
    [ "$uid" = 0 ] || [ "$uid" -ge 1000 ] 2>/dev/null || continue
    case "$shell" in *nologin|*false) [ "$uid" = 0 ] || continue;; esac
    grps=$(id -Gn "$name" 2>/dev/null)
    act=""; grep -q "^$name " /tmp/.lisin_who 2>/dev/null && act=yes
    printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' "$name" "$uid" "$gecos" "$home" "$shell" "$act" "$grps"
  done
  rm -f /tmp/.lisin_who
  true
interval: 120
enabled: true
