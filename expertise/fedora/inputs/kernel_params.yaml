name: kernel_params
id: LS-I-40
type: input
version: 2.0.0
title: Kernel parameters vs declared configuration
# NO LISTS FROM ME. There used to be a hard-coded list of 15 "important"
# parameters and a reference of "correct" values - both go stale and lie on
# another machine.
#
# Now we compare the system WITH ITSELF: the distribution and the administrator
# declare the values they want in /usr/lib/sysctl.d, /run/sysctl.d, /etc/sysctl.d
# and /etc/sysctl.conf. We read those declarations and compare them with what is
# actually set in the kernel. A divergence means somebody changed the value on
# the fly (sysctl -w, an application, malware) - that is the signal, unlike an
# opinion about which value is "good".
command: |
  echo "===RUNNING==="
  sysctl -a 2>/dev/null | sed 's/ = /\t/'
  echo "===DECLARED==="
  for f in /usr/lib/sysctl.d/*.conf /run/sysctl.d/*.conf /etc/sysctl.d/*.conf /etc/sysctl.conf; do
    [ -r "$f" ] || continue
    sed "s|^|$f\t|" "$f"
  done
  true
interval: 3600
enabled: true
