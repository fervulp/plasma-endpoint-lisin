name: db_packages
id: LS-O-packages
type: statedb
version: 2.0.0
title: Applications
table: applications
# THE KEY INCLUDES THE VERSION AND THE ARCHITECTURE. With [kind, name] packages
# with the same name collapsed into one row: every rpm GPG key is called
# gpg-pubkey, and libgcc is installed both for i686 and for x86_64. Every run
# a different package "won" - the table showed hundreds of false changes and
# drowned the real installation.
# the path is in the key too: for kind=bin it is THE PATH that tells apart files
# with the same name (the same tool may live both in ~/.local/bin and in
# /usr/local/bin - the rows collapsed and "changed" on every run).
# For rpm the path is empty, so this does not affect them.
key: [kind, name, version, arch, path]
icon: applications-all
# THREE rules write into the applications table (applications, packages,
# dev_packages), each owns its share of the rows and its own staleness. Tracking
# has to be enabled on EVERY one of them: otherwise the removal of an rpm package
# goes unnoticed, because its row is deleted by a different writer.
track_changes: true
# DERIVED columns: they are computed by enrichment from neighbouring rows, so a
# change in them is not an event of the system. One package appears and the
# counters of dozens of other rows are recomputed, drowning the real installation.
derived_columns: [deps_count, required_by, required_by_names, category, purpose, url]
