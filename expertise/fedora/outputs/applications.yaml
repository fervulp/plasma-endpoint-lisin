name: db_applications
id: LS-O-applications
type: statedb
version: 1.0.0
title: Applications
table: applications
# КЛЮЧ ВКЛЮЧАЕТ ВЕРСИЮ И АРХИТЕКТУРУ. По [kind, name] пакеты с одинаковым
# именем схлопывались в одну строку: все GPG-ключи rpm называются
# gpg-pubkey, а libgcc стоит и в i686, и в x86_64. Каждый прогон
# «побеждал» другой пакет — таблица показывала сотни ложных изменений
# и топила настоящую установку.
# path тоже в ключе: у kind=bin ИМЕННО ПУТЬ отличает файлы с
# одинаковым именем (winapps лежал и в ~/.local/bin, и в
# /usr/local/bin — строки схлопывались и «менялись» каждый прогон).
# У rpm путь пуст, поэтому на них это не влияет.
key: [kind, name, version, arch, path]
icon: applications-all
# ОТСЛЕЖИВАТЬ ПЕРЕХОДЫ: появление/исчезновение/изменение строки порождает
# событие (event_module=statediff). Включаем только у ИНВЕНТАРНЫХ таблиц —
# у текучих (процессы, сокеты) есть свои источники событий, и дублировать
# их изменениями значит утопить ленту.
track_changes: true
# ВЫЧИСЛЯЕМЫЕ колонки: их считает обогащение из соседних строк, поэтому их
# изменение — не событие системы. Появился один пакет — пересчитались
# счётчики у десятков чужих строк, и настоящая установка тонула в шуме.
derived_columns: [deps_count, required_by, required_by_names, category, purpose, url]
