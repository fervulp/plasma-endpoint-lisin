# TRACK TRANSITIONS: a row appearing/disappearing/changing produces an event
# (event_module=statediff). We enable it only for INVENTORY tables - the fluid
# ones (processes, sockets) have their own event sources, and duplicating them
# with changes means drowning the feed.
track_changes: true
