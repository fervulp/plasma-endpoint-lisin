title: Swap
code: |
  def normalize(text):
      rows = []
      for ln in text.splitlines():
          f = ln.split()
          if len(f) < 4:
              continue
          rows.append({"name": f[0], "type": f[1], "size": f[2],
                       "used": f[3], "priority": f[4] if len(f) > 4 else ""})
      return rows
