name: security
id: LS-N-20
type: normalization_rule
version: 3.0.0
title: Security posture
# A normalization plugin: Python code right in the rule (self-contained - the rule
# can be handed to another user as a contribution). The function is mandatory:
#   normalize(text) -> list[dict]   (text = the stdout of the input)
# re and json are available in the namespace. The table columns = the dict keys.
code: |
  def normalize(text):
      rows = []
      for line in text.splitlines():
          if "=" in line and ":" not in line:
              k, _, v = line.partition("=")
              if v.strip():
                  rows.append({"item": k.strip(), "value": v.strip()})
          elif ":" in line:
              k, _, v = line.partition(":")
              if v.strip():
                  rows.append({"item": k.strip().lower().replace(" ", "_"),
                               "value": v.strip()})
      return rows
