name: services
id: LS-N-4
type: normalization_rule
version: 3.0.0
title: systemd services
code: |
  def normalize(text):
      s1 = text.split("---FILES---")
      body = s1[0]
      s2 = (s1[1] if len(s1) > 1 else "").split("---UFILES---")
      files_sys = s2[0]
      s3 = (s2[1] if len(s2) > 1 else "").split("---CAT---")
      files_user = s3[0]
      s4 = (s3[1] if len(s3) > 1 else "").split("---UCAT---")
      cat_sys = s4[0]
      cat_user = s4[1] if len(s4) > 1 else ""

      enabled = {}
      for ln in (files_sys + "\n" + files_user).split("\n"):
          p = ln.split()
          if len(p) >= 2:
              enabled[p[0]] = p[1]

      contents = {}
      for i, b in enumerate((cat_sys + "\n" + cat_user).split("\n# /")):
          body2 = b if i == 0 else "# /" + b
          fm = re.search(r'(?m)^# /\S*/(\S+\.service)', body2)
          if fm:
              contents[fm.group(1)] = body2.strip()

      rows, scope = [], "system"
      for ln in body.split("\n"):
          st = ln.strip()
          if st == "---USER---":
              scope = "user"
              continue
          f = st.split(None, 4)
          if len(f) >= 4 and f[0].endswith(".service"):
              rows.append({"unit": f[0], "scope": scope,
                           "enabled": enabled.get(f[0], ""),
                           "desc": f[4] if len(f) > 4 else "",
                           "content": contents.get(f[0], "")})
      return rows
