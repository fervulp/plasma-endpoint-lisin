name: unpackaged_config
id: LS-N-59
type: normalization_rule
version: 1.0.0
title: Config files not owned by any package
code: "def normalize(text):\n    import datetime\n    rows = []\n    for ln in text.split(\"\\n\"):\n\
  \        f = ln.split(\"\\t\")\n        if len(f) < 5 or not f[0].startswith(\"/etc\"):\n          \
  \  continue\n        path, owner, group, mode, mtime = f[0], f[1], f[2], f[3], f[4]\n        when =\
  \ \"\"\n        if mtime.isdigit():\n            when = datetime.datetime.fromtimestamp(\n         \
  \       int(mtime)).strftime(\"%Y-%m-%d %H:%M\")\n        # WHOSE RECORD THIS IS. The property is structural,\
  \ without lists of names: a\n        # file in /etc that does NOT belong to root can be written by an\
  \ ordinary user,\n        # while a service reads it.\n        try:\n            m = int(mode, 8)\n\
  \        except ValueError:\n            m = 0\n        world_writable = \"yes\" if m & 0o002 else \"\
  \"\n        user_owned = \"yes\" if owner not in (\"root\",) else \"\"\n        rows.append({\"path\"\
  : path, \"owner\": owner, \"group\": group,\n                     \"mode\": mode, \"user_owned\": user_owned,\n\
  \                     \"world_writable\": world_writable, \"changed\": when,\n                     \"\
  dir\": path.rsplit(\"/\", 1)[0]})\n    return rows\n"
