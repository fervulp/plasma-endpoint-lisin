name: kmods
id: LS-N-8
type: normalization_rule
version: 3.0.0
title: Kernel modules
code: "def normalize(text):\n    rows = []\n    for line in text.splitlines():\n        f = line.split(\"\\t\")\n        if len(f) < 3:\n            continue\n        rows.append({\"name\": f[0], \"size\": f[1], \"refcount\": f[2],\n                     \"used_by\": f[3] if len(f) > 3 else \"\",\n                     \"description\": f[4].strip() if len(f) > 4 else \"\"})\n    return rows\n"
