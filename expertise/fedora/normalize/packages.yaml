name: packages
id: LS-N-2
type: normalization_rule
version: 2.2.1
title: Applications
code: "\ndef normalize(text):\n    \"\"\"rpm packages with REAL dependencies.\n\n    depends used to hold\
  \ the raw REQUIRENAME - those are CAPABILITIES\n    (`libc.so.6()(64bit)`, `rtld(GNU_HASH)`), not packages,\
  \ and they were impossible\n    to read. Now:\n\n      * every capability is resolved into a PACKAGE\
  \ through the provides index\n        (`rpm -qa --qf '[%{PROVIDENAME}\\t%{=NAME}\\n]'`, 47 thousand\
  \ rows in 0.7 s -\n        entirely local, without the network and without dnf);\n      * WEAK dependencies\
  \ (Recommends/Suggests) were added. They were exactly what\n        was missing: btop does not require\
  \ rocm-smi but RECOMMENDS it - so dnf\n        installs it together with btop and calls it an \"unused\
  \ dependency\" on\n        removal, while the inventory did not show it;\n      * the install_reason\
  \ column: installed by the user or pulled in as a\n        dependency (`dnf repoquery --userinstalled`).\
  \ That answers the question\n        \"what did I install myself and what came along\".\n    \"\"\"\n\
  \    SEC, cur = {}, None\n    for ln in text.split(\"\\n\"):\n        s = ln.strip()\n        if s.startswith(\"\
  ===\") and s.endswith(\"===\"):\n            cur = s.strip(\"=\")\n            SEC[cur] = []\n     \
  \       continue\n        if cur:\n            SEC[cur].append(ln)\n\n    provides = {}\n    for ln\
  \ in SEC.get(\"PROVIDES\", []):\n        f = ln.split(\"\\t\")\n        if len(f) == 2 and f[0] and\
  \ f[1]:\n            provides.setdefault(f[0].strip(), f[1].strip())\n\n    user_installed = set()\n\
  \    for ln in SEC.get(\"USERINSTALLED\", []):\n        s = ln.strip()\n        if not s:\n        \
  \    continue\n        # a string like \"name-0:version.arch\" - the name up to the first \"-<digit>\"\
  \n        m = re.match(r\"^(.+?)-\\d[^-]*:\", s) or re.match(r\"^(.+?)-\\d\", s)\n        user_installed.add(m.group(1)\
  \ if m else s)\n\n    def resolve(caps, self_name):\n        \"\"\"Capabilities -> packages. rpmlib(...)\
  \ are internal requirements of rpm\n        itself and have nothing to do with the inventory.\"\"\"\n\
  \        # rpm supports BOOLEAN dependencies: \"(pkg-a or pkg-b)\". In the flat output\n        # they\
  \ fall apart into tokens \"(pkg-a\", \"or\", \"pkg-b)\" - the operators have to\n        # be dropped\
  \ and the parentheses stripped, otherwise \"or\" appears in the list.\n        BOOL = {\"or\", \"and\"\
  , \"if\", \"else\", \"unless\", \"with\", \"without\"}\n        out = []\n        for raw in caps:\n\
  \            c = raw.strip()\n            if not c or c.strip(\"()\") in BOOL:\n                continue\n\
  \            if c.startswith(\"rpmlib(\") or c.startswith(\"config(\"):\n                continue\n\
  \            # IMPORTANT: first we try the capability AS IS - its parentheses are\n            # meaningful\
  \ (\"libc.so.6()(64bit)\"). Stripping them applies only to the\n            # fragments of boolean expressions,\
  \ so that is a second attempt.\n            pkg = provides.get(c) or provides.get(c.strip(\"()\"))\n\
  \            if pkg is None:\n                c = c.strip(\"()\")\n            if pkg is None:\n   \
  \             # the capability is provided by nothing installed - usually it is the\n              \
  \  # name of a package that is absent; we keep it as is, but only if it\n                # looks like\
  \ a name rather than a shared object file or a version\n                if re.match(r\"^[A-Za-z][\\\
  w.+-]*$\", c):\n                    pkg = c\n            if pkg and pkg != self_name and pkg not in\
  \ out:\n                out.append(pkg)\n        return out\n\n    rows = []\n    for ln in SEC.get(\"\
  PKG\", []):\n        f = ln.split(\"\\t\")\n        if len(f) < 7 or not f[0].strip():\n           \
  \ continue\n        name, ver, itime, arch, vendor, summary = [x.strip() for x in f[:6]]\n        req\
  \ = f[6].split() if len(f) > 6 else []\n        rec = f[7].split() if len(f) > 7 else []\n        sug\
  \ = f[8].split() if len(f) > 8 else []\n        hard = resolve(req, name)\n        weak = resolve(rec\
  \ + sug, name)\n        when = \"\"\n        if itime.isdigit():\n            import datetime\n    \
  \        when = datetime.datetime.fromtimestamp(\n                int(itime)).strftime(\"%Y-%m-%d %H:%M\"\
  )\n        rows.append({\n            \"kind\": \"rpm\", \"name\": name, \"version\": ver,\n       \
  \     \"installed\": when, \"vendor\": vendor, \"description\": summary,\n            \"install_reason\"\
  : (\"user\" if name in user_installed\n                               else \"dependency\"),\n      \
  \      # depends holds only REAL packages; the weak ones are kept separately\n            # because\
  \ they can be removed without breaking the program\n            \"depends\": \" \".join(hard),\n   \
  \         \"recommends\": \" \".join(weak),\n            \"arch\": arch, \"app_id\": \"\", \"path\"\
  : \"\"})\n    return rows\n"
tests:
- name: capabilities resolve into packages, weak dependencies are visible
  input: "===PKG===\nbtop\t1.4.7-1.fc44\t1750000000\tx86_64\tFedora\tResource monitor\tlibc.so.6()(64bit)\
    \ hicolor-icon-theme rpmlib(FileDigests) \trocm-smi \t \nrocm-smi\t7.1.1-3.fc44\t1750000000\tx86_64\t\
    Fedora\tGPU tool\tlibc.so.6()(64bit) \t \t \n===PROVIDES===\nlibc.so.6()(64bit)\tglibc\nhicolor-icon-theme\t\
    hicolor-icon-theme\nrocm-smi\trocm-smi\n===USERINSTALLED===\nbtop-0:1.4.7-1.fc44.x86_64\n"
  expect:
    rows: 2
    row0:
      name: btop
      install_reason: user
      recommends: rocm-smi
    row1:
      name: rocm-smi
      install_reason: dependency
- name: a boolean operator does not get into the list, capability parentheses are not broken
  input: "===PKG===\nx\t1-1\t0\tnoarch\tv\ts\tlibc.so.6()(64bit) \t(a or b) \t \n===PROVIDES===\nlibc.so.6()(64bit)\t\
    glibc\na\ta\nb\tb\n===USERINSTALLED===\n"
  expect:
    rows: 1
    row0:
      depends: glibc
      recommends: a b
