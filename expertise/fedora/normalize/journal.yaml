name: journal
id: LS-N-40
type: normalization_rule
version: 2.1.0
title: Journal + audit → event taxonomy
code: "def normalize(text):\n    import datetime, pwd\n\n    SYSCALLS = {\"41\": \"socket\", \"42\": \"\
  connect\", \"43\": \"accept\",\n                \"288\": \"accept4\", \"44\": \"sendto\", \"45\": \"\
  recvfrom\",\n                \"49\": \"bind\", \"50\": \"listen\", \"59\": \"execve\",\n           \
  \     \"322\": \"execveat\", \"2\": \"open\", \"257\": \"openat\",\n                \"87\": \"unlink\"\
  , \"263\": \"unlinkat\", \"82\": \"rename\",\n                \"105\": \"setuid\", \"106\": \"setgid\"\
  , \"113\": \"setreuid\",\n                \"117\": \"setresuid\", \"165\": \"mount\", \"166\": \"umount2\"\
  ,\n                \"101\": \"ptrace\", \"321\": \"bpf\", \"175\": \"init_module\",\n              \
  \  \"313\": \"finit_module\", \"176\": \"delete_module\"}\n    NET = {\"socket\", \"connect\", \"accept\"\
  , \"accept4\", \"sendto\",\n           \"recvfrom\", \"bind\", \"listen\"}\n    # auditd type numbers\
  \ -> human readable names (journald returns AUDIT1123)\n    ATYPE = {\"1100\": \"USER_AUTH\", \"1101\"\
  : \"USER_ACCT\", \"1102\": \"USER_MGMT\",\n             \"1103\": \"CRED_ACQ\", \"1104\": \"CRED_DISP\"\
  , \"1105\": \"USER_START\",\n             \"1106\": \"USER_END\", \"1107\": \"USER_AVC\", \"1108\":\
  \ \"USER_CHAUTHTOK\",\n             \"1110\": \"USER_CMD\", \"1111\": \"USER_TTY\", \"1112\": \"USER_LOGIN\"\
  ,\n             \"1113\": \"USER_LOGOUT\", \"1123\": \"USER_CMD\", \"1126\": \"USER_ROLE_CHANGE\",\n\
  \             \"1130\": \"SERVICE_START\", \"1131\": \"SERVICE_STOP\",\n             \"1132\": \"GRP_AUTH\"\
  , \"2405\": \"CRYPTO_KEY_USER\"}\n\n    def s(e, k, d=\"\"):\n        v = e.get(k, d)\n        if isinstance(v,\
  \ list):\n            v = v[0] if v else d\n        return \"\" if v is None else str(v)\n\n    def\
  \ iso(us):\n        try:\n            return datetime.datetime.fromtimestamp(\n                int(us)\
  \ / 1000000.0, datetime.timezone.utc\n            ).strftime(\"%Y-%m-%dT%H:%M:%SZ\")\n        except\
  \ Exception:\n            return \"\"\n\n    _uc = {}\n\n    def uname(uid):\n        if not uid or\
  \ uid in (\"4294967295\", \"-1\", \"unset\"):\n            return \"\"\n        if uid not in _uc:\n\
  \            try:\n                _uc[uid] = pwd.getpwuid(int(uid)).pw_name\n            except Exception:\n\
  \                _uc[uid] = \"\"\n        return _uc[uid]\n\n    KV = re.compile(r\"\"\"(\\w+)=(\"([^\"\
  ]*)\"|'([^']*)'|\\S+)\"\"\")\n\n    def kv(txt):\n        \"\"\"key=value / key=\"value\" / key='value'\
  \ -> dict. That is how EVERYTHING audit\n        put into the text is taken from MESSAGE (uid/euid/comm/exe/key/ses...),\
  \ not only\n        the fields journald exposed in _AUDIT_FIELD_*.\"\"\"\n        out = {}\n       \
  \ for m in KV.finditer(txt or \"\"):\n            v = m.group(3)\n            if v is None:\n      \
  \          v = m.group(4)\n            if v is None:\n                v = m.group(2)\n            out.setdefault(m.group(1),\
  \ v)\n        return out\n\n    def unhex(v):\n        \"\"\"auditd returns cmd/proctitle in hex if\
  \ there are special characters.\"\"\"\n        if v and len(v) % 2 == 0 and re.fullmatch(r\"[0-9A-Fa-f]+\"\
  , v):\n            try:\n                return bytes.fromhex(v).replace(b\"\\x00\", b\" \").decode(\n\
  \                    \"utf-8\", \"replace\").strip()\n            except Exception:\n              \
  \  return v\n        return v\n\n    def saddr(h):\n        try:\n            b = bytes.fromhex(h)\n\
  \        except Exception:\n            return {}\n        if len(b) < 4:\n            return {}\n \
  \       fam = b[0] | (b[1] << 8)\n        if fam == 2 and len(b) >= 8:\n            return {\"ip\":\
  \ \".\".join(str(x) for x in b[4:8]),\n                    \"port\": (b[2] << 8) | b[3]}\n        if\
  \ fam == 10 and len(b) >= 24:\n            p = [\"%x\" % ((b[8 + i] << 8) | b[9 + i]) for i in range(0,\
  \ 16, 2)]\n            return {\"ip\": \":\".join(p), \"port\": (b[2] << 8) | b[3]}\n        if fam\
  \ == 1:\n            return {\"unix\": b[2:].split(b\"\\x00\")[0].decode(\"utf-8\", \"replace\")}\n\
  \        return {}\n\n    recs = []\n    for ln in text.splitlines():\n        ln = ln.strip()\n   \
  \     if not ln or ln[0] != \"{\":\n            continue\n        try:\n            recs.append(json.loads(ln,\
  \ strict=False))\n        except Exception:\n            continue\n\n    groups, order, singles = {},\
  \ [], []\n    for e in recs:\n        if e.get(\"_TRANSPORT\") == \"audit\" and e.get(\"_AUDIT_ID\"\
  ):\n            k = s(e, \"_BOOT_ID\") + \":\" + s(e, \"_AUDIT_ID\")\n            if k not in groups:\n\
  \                groups[k] = []\n                order.append(k)\n            groups[k].append(e)\n\
  \        else:\n            singles.append(e)\n\n    rows = []\n    for k in order:\n        grp = groups[k]\n\
  \        by, fields = {}, {}\n        for r in grp:\n            tname = s(r, \"_AUDIT_TYPE_NAME\")\
  \ or ATYPE.get(s(r, \"_AUDIT_TYPE\"), \"\") \\\n                    or (\"AUDIT\" + s(r, \"_AUDIT_TYPE\"\
  ))\n            by.setdefault(tname, r)\n            # 1) the fields exposed by journald\n         \
  \   for kk, vv in r.items():\n                if kk.startswith(\"_AUDIT_FIELD_\"):\n               \
  \     fields.setdefault(kk[13:].lower(), s(r, kk))\n            # 2) EVERYTHING else from the MESSAGE\
  \ text (there are noticeably more fields there)\n            msg = s(r, \"MESSAGE\")\n            body\
  \ = msg.split(\" \", 1)[1] if \" \" in msg else msg\n            parsed = kv(body)\n            inner\
  \ = parsed.pop(\"msg\", \"\")\n            for kk, vv in parsed.items():\n                fields.setdefault(kk.lower(),\
  \ vv)\n            if inner:                      # a nested msg='op=... res=...'\n                for\
  \ kk, vv in kv(inner).items():\n                    fields.setdefault(kk.lower(), vv)\n\n        main\
  \ = by.get(\"SYSCALL\") or grp[0]\n        boot, aid = k.split(\":\", 1)\n        sysnum = fields.get(\"\
  syscall\", \"\")\n        sysname = SYSCALLS.get(sysnum, sysnum)\n        uid = fields.get(\"uid\")\
  \ or s(main, \"_UID\")\n        auid = fields.get(\"auid\") or s(main, \"_AUDIT_LOGINUID\")\n      \
  \  res = (fields.get(\"res\") or fields.get(\"success\") or \"\").lower()\n        outcome = (\"success\"\
  \ if res in (\"success\", \"yes\")\n                   else \"failure\" if res in (\"failed\", \"no\"\
  ) else \"unknown\")\n        atypes = set(x for x in by if x)\n\n        row = {\n            \"ts\"\
  : iso(s(main, \"_SOURCE_REALTIME_TIMESTAMP\")\n                      or s(main, \"__REALTIME_TIMESTAMP\"\
  )),\n            \"event_id\": \"audit:\" + boot + \":\" + aid,\n            \"event_kind\": \"event\"\
  ,\n            \"event_module\": \"audit\",\n            \"event_dataset\": \"journal.audit\",\n   \
  \         \"event_provider\": s(main, \"SYSLOG_IDENTIFIER\") or s(main, \"_COMM\"),\n            \"\
  event_outcome\": outcome,\n            \"audit_type\": \",\".join(sorted(atypes)),\n            \"audit_id\"\
  : aid,\n            \"audit_key\": (fields.get(\"key\") or \"\").strip('\"'),\n            \"audit_session\"\
  : fields.get(\"ses\") or s(main, \"_AUDIT_SESSION\"),\n            \"syscall\": sysname,\n         \
  \   \"host_name\": s(main, \"_HOSTNAME\"),\n            \"host_id\": s(main, \"_MACHINE_ID\"),\n   \
  \         \"host_boot_id\": boot,\n            \"user_id\": uid,\n            \"user_name\": uname(uid)\
  \ or (fields.get(\"acct\") or \"\").strip('\"'),\n            \"user_group\": fields.get(\"gid\") or\
  \ s(main, \"_GID\"),\n            \"user_effective_id\": fields.get(\"euid\") or fields.get(\"suid\"\
  , \"\"),\n            \"user_audit_id\": auid,\n            \"process_pid\": fields.get(\"pid\") or\
  \ s(main, \"_PID\"),\n            \"process_name\": (fields.get(\"comm\") or s(main, \"_COMM\")).strip('\"\
  '),\n            \"process_executable\": (fields.get(\"exe\") or s(main, \"_EXE\")).strip('\"'),\n \
  \           \"process_tty\": (fields.get(\"terminal\") or fields.get(\"tty\")\n                    \
  \        or s(main, \"_TTY\")),\n            \"process_exit_code\": fields.get(\"exit\", \"\"),\n  \
  \          \"process_working_directory\": (fields.get(\"cwd\") or \"\").strip('\"'),\n            \"\
  parent_pid\": fields.get(\"ppid\", \"\"),\n            \"selinux_context\": fields.get(\"subj\") or\
  \ s(main, \"_SELINUX_CONTEXT\"),\n            \"service_name\": (fields.get(\"unit\") or \"\").strip('\"\
  ')\n                            or s(main, \"_SYSTEMD_UNIT\") or s(main, \"_SYSTEMD_USER_UNIT\"),\n\
  \            \"message\": \" | \".join(s(r, \"MESSAGE\") for r in grp\n                            \
  \      if s(r, \"MESSAGE\"))[:2000],\n            \"raw\": json.dumps(grp, ensure_ascii=False)[:20000],\n\
  \            \"related_user\": uname(uid),\n        }\n        # the command: PROCTITLE (hex/string)\
  \ or USER_CMD cmd=<hex>\n        cmdline = unhex((fields.get(\"cmd\") or \"\").strip('\"'))\n      \
  \  if not cmdline:\n            cmdline = unhex((fields.get(\"proctitle\") or \"\").strip('\"'))\n \
  \       row[\"process_command_line\"] = cmdline or s(main, \"_CMDLINE\")\n        # what was NOT parsed\
  \ is immediately visible in the not_normalized column\n        USED = {\"syscall\", \"uid\", \"auid\"\
  , \"gid\", \"euid\", \"suid\", \"ses\", \"pid\",\n                \"ppid\", \"comm\", \"exe\", \"key\"\
  , \"exit\", \"success\", \"res\", \"cwd\",\n                \"terminal\", \"tty\", \"subj\", \"saddr\"\
  , \"addr\", \"hostname\", \"name\",\n                \"mode\", \"ouid\", \"cmd\", \"proctitle\", \"\
  unit\", \"acct\", \"op\",\n                \"arch\", \"items\", \"fsuid\", \"fsgid\", \"egid\", \"sgid\"\
  ,\n                \"a0\", \"a1\", \"a2\", \"a3\", \"msg\"}\n        row[\"not_normalized\"] = \", \"\
  .join(\n            sorted(x for x in fields if x not in USED)[:25])\n\n        # network: SOCKADDR\
  \ or addr= on USER_* (where the login came from)\n        sa = by.get(\"SOCKADDR\")\n        if sa:\n\
  \            d = saddr(fields.get(\"saddr\", \"\") or s(sa, \"_AUDIT_FIELD_SADDR\"))\n            if\
  \ d.get(\"ip\"):\n                row[\"destination_ip\"] = d[\"ip\"]\n                row[\"destination_port\"\
  ] = d.get(\"port\")\n                row[\"related_ip\"] = d[\"ip\"]\n                row[\"network_transport\"\
  ] = \"tcp\" if sysname in (\n                    \"connect\", \"accept\", \"accept4\", \"listen\", \"\
  bind\") else \"udp\"\n                row[\"network_direction\"] = \"outbound\"\n                if\
  \ d.get(\"port\") == 53:\n                    row[\"network_protocol\"] = \"dns\"\n            elif\
  \ d.get(\"unix\"):\n                row[\"file_path\"] = d[\"unix\"]\n        addr = (fields.get(\"\
  addr\") or \"\").strip('\"')\n        if addr and addr not in (\"?\", \"unset\"):\n            row[\"\
  source_ip\"] = addr\n            row.setdefault(\"related_ip\", addr)\n            row[\"network_direction\"\
  ] = \"inbound\"\n        host = (fields.get(\"hostname\") or \"\").strip('\"')\n        if host and\
  \ host not in (\"?\", \"unset\"):\n            row[\"source_domain\"] = host\n\n        # file: a PATH\
  \ record or name=\n        nm = (fields.get(\"name\") or \"\").strip('\"')\n        if nm and nm not\
  \ in (\"?\",):\n            row[\"file_path\"] = nm\n            row[\"file_name\"] = nm.rsplit(\"/\"\
  , 1)[-1]\n            if \"/\" in nm:\n                row[\"file_directory\"] = nm.rsplit(\"/\", 1)[0]\n\
  \            if \".\" in row[\"file_name\"]:\n                row[\"file_extension\"] = row[\"file_name\"\
  ].rsplit(\".\", 1)[-1]\n        if fields.get(\"mode\"):\n            row[\"file_mode\"] = fields[\"\
  mode\"]\n        if fields.get(\"ouid\"):\n            row[\"file_owner\"] = uname(fields[\"ouid\"])\
  \ or fields[\"ouid\"]\n\n        # classification\n        cat, typ, act, sev = \"process\", \"info\"\
  , \"audit\", 20\n        op = (fields.get(\"op\") or \"\").strip('\"')\n        if \"USER_CMD\" in atypes:\n\
  \            cat, typ, act, sev = \"process\", \"start\", \"user_command\", 55\n        elif atypes\
  \ & {\"USER_AUTH\", \"USER_LOGIN\", \"CRED_ACQ\", \"USER_ACCT\",\n                       \"USER_START\"\
  , \"USER_END\", \"USER_LOGOUT\", \"CRED_DISP\",\n                       \"USER_CHAUTHTOK\", \"GRP_AUTH\"\
  }:\n            cat, sev = \"authentication\", 45\n            typ = \"end\" if atypes & {\"USER_LOGOUT\"\
  , \"USER_END\", \"CRED_DISP\"} else \"start\"\n            act = op or (\"user_logout\" if typ == \"\
  end\" else \"user_auth\")\n        elif \"USER_MGMT\" in atypes or \"USER_ROLE_CHANGE\" in atypes:\n\
  \            cat, typ, act, sev = \"iam\", \"change\", op or \"account_change\", 60\n        elif sysname\
  \ in NET or \"SOCKADDR\" in atypes:\n            cat, typ, act, sev = \"network\", \"connection\", sysname\
  \ or \"connect\", 30\n        elif sysname in (\"execve\", \"execveat\"):\n            cat, typ, act,\
  \ sev = \"process\", \"start\", \"executed\", 40\n        elif \"SERVICE_START\" in atypes or \"SERVICE_STOP\"\
  \ in atypes:\n            started = \"SERVICE_START\" in atypes\n            cat, typ = \"process\"\
  , \"start\" if started else \"end\"\n            act = \"service_start\" if started else \"service_stop\"\
  \n            sev = 25\n        elif sysname in (\"setuid\", \"setgid\", \"setreuid\", \"setresuid\"\
  ):\n            cat, typ, act, sev = \"process\", \"change\", \"privilege_change\", 60\n        elif\
  \ sysname in (\"init_module\", \"finit_module\", \"delete_module\") or \"BPF\" in atypes:\n        \
  \    cat, typ, act, sev = \"driver\", \"change\", \"kernel_module\", 70\n        elif \"USER_AVC\" in\
  \ atypes or \"AVC\" in atypes or any(\n                x.startswith(\"ANOM\") for x in atypes):\n  \
  \          cat, typ, act, sev = \"intrusion_detection\", \"denied\", \"selinux_denied\", 65\n      \
  \  elif \"NETFILTER_CFG\" in atypes:\n            cat, typ, act, sev = \"configuration\", \"change\"\
  , \"firewall_change\", 35\n        elif sysname in (\"open\", \"openat\", \"unlink\", \"unlinkat\",\
  \ \"rename\"):\n            cat, typ, act, sev = \"file\", \"access\", sysname, 25\n        if outcome\
  \ == \"failure\":\n            sev += 15\n        # an action by root is more notable\n        if uid\
  \ == \"0\" and cat in (\"process\", \"iam\", \"authentication\"):\n            sev += 5\n        row[\"\
  event_category\"], row[\"event_type\"], row[\"event_action\"] = cat, typ, act\n        row[\"event_severity\"\
  ] = min(100, sev)\n        rows.append(row)\n\n    # ---------------- NON-audit journal records ----------------\n\
  \    UNIT_RE = re.compile(\n        r\"^(Started|Starting|Stopped|Stopping|Reloading|Failed to start|\"\
  \n        r\"Deactivated successfully|Succeeded)\\b(.*)$\")\n    for e in singles:\n        ident =\
  \ s(e, \"SYSLOG_IDENTIFIER\") or s(e, \"_COMM\")\n        msg = s(e, \"MESSAGE\")\n        try:\n  \
  \          prio = int(s(e, \"PRIORITY\") or \"6\")\n        except Exception:\n            prio = 6\n\
  \        unit = s(e, \"_SYSTEMD_UNIT\") or s(e, \"_SYSTEMD_USER_UNIT\")\n        cat, typ, act, sev\
  \ = \"process\", \"info\", \"log\", 10\n\n        if ident in (\"sudo\", \"pkexec\", \"su\", \"polkitd\"\
  ):\n            cat, typ, act, sev = \"authentication\", \"info\", \"privileged_command\", 55\n    \
  \    elif ident in (\"sshd\", \"systemd-logind\", \"login\", \"gdm\", \"sddm\"):\n            cat, typ,\
  \ act, sev = \"session\", \"info\", \"session_activity\", 25\n        elif ident in (\"useradd\", \"\
  userdel\", \"usermod\", \"groupadd\", \"passwd\", \"chage\"):\n            cat, typ, act, sev = \"iam\"\
  , \"change\", \"account_change\", 50\n        elif ident in (\"NetworkManager\", \"wpa_supplicant\"\
  , \"systemd-resolved\",\n                       \"dhclient\", \"dnsmasq\"):\n            cat, typ, act,\
  \ sev = \"network\", \"info\", \"network_activity\", 15\n        elif ident in (\"dnf\", \"dnf5\", \"\
  rpm\", \"packagekitd\"):\n            cat, typ, act, sev = \"package\", \"change\", \"package_activity\"\
  , 35\n        elif ident == \"kernel\":\n            cat, typ, act, sev = \"driver\", \"info\", \"kernel_message\"\
  , 15\n\n        # systemd: \"Started foo.service - Desc.\" -> the unit + the action\n        m = UNIT_RE.match(msg.strip())\n\
  \        if m and ident in (\"systemd\", \"systemd-user\") or (m and unit):\n            verb = m.group(1)\n\
  \            rest = m.group(2).strip()\n            um = re.search(r\"([\\w@.\\\\-]+\\.(service|timer|socket|target|scope|mount|path))\"\
  ,\n                           rest) or re.search(\n                r\"([\\w@.\\\\-]+\\.(service|timer|socket|target|scope|mount|path))\"\
  , msg)\n            if um:\n                unit = um.group(1)\n            cat = \"process\"\n    \
  \        if verb in (\"Started\", \"Starting\"):\n                typ, act, sev = \"start\", \"service_start\"\
  , 20\n            elif verb in (\"Stopped\", \"Stopping\", \"Deactivated successfully\", \"Succeeded\"\
  ):\n                typ, act, sev = \"end\", \"service_stop\", 15\n            elif verb.startswith(\"\
  Failed\"):\n                typ, act, sev, prio = \"info\", \"service_failed\", 55, min(prio, 3)\n \
  \       if prio <= 3:\n            sev += 25\n\n        uid = s(e, \"_UID\")\n        row = {\n    \
  \        \"ts\": iso(s(e, \"_SOURCE_REALTIME_TIMESTAMP\")\n                      or s(e, \"__REALTIME_TIMESTAMP\"\
  )),\n            \"event_id\": s(e, \"__CURSOR\"),\n            \"event_kind\": \"event\",\n       \
  \     \"event_category\": cat, \"event_type\": typ, \"event_action\": act,\n            \"event_outcome\"\
  : \"failure\" if prio <= 3 else \"success\",\n            \"event_severity\": min(100, sev),\n     \
  \       \"event_module\": \"journal\",\n            \"event_dataset\": \"journal.\" + (s(e, \"_TRANSPORT\"\
  ) or \"syslog\"),\n            \"event_provider\": ident,\n            \"host_name\": s(e, \"_HOSTNAME\"\
  ), \"host_id\": s(e, \"_MACHINE_ID\"),\n            \"host_boot_id\": s(e, \"_BOOT_ID\"),\n        \
  \    \"user_id\": uid, \"user_name\": uname(uid), \"user_group\": s(e, \"_GID\"),\n            \"related_user\"\
  : uname(uid),\n            \"process_pid\": s(e, \"_PID\"), \"process_name\": s(e, \"_COMM\"),\n   \
  \         \"process_executable\": s(e, \"_EXE\"),\n            \"process_command_line\": s(e, \"_CMDLINE\"\
  ),\n            \"process_tty\": s(e, \"_TTY\"),\n            \"selinux_context\": s(e, \"_SELINUX_CONTEXT\"\
  ),\n            \"service_name\": unit,\n            \"message\": msg[:2000],\n            \"raw\":\
  \ json.dumps(e, ensure_ascii=False)[:20000],\n        }\n        JUSED = {\"MESSAGE\", \"PRIORITY\"\
  , \"SYSLOG_IDENTIFIER\", \"SYSLOG_FACILITY\",\n                 \"SYSLOG_PID\", \"SYSLOG_TIMESTAMP\"\
  , \"SYSLOG_RAW\",\n                 \"_HOSTNAME\", \"_MACHINE_ID\", \"_BOOT_ID\", \"_UID\", \"_GID\"\
  ,\n                 \"_PID\", \"_COMM\", \"_EXE\", \"_CMDLINE\", \"_TTY\", \"_TRANSPORT\",\n       \
  \          \"_SELINUX_CONTEXT\", \"_SYSTEMD_UNIT\", \"_SYSTEMD_USER_UNIT\",\n                 \"_SOURCE_REALTIME_TIMESTAMP\"\
  , \"__REALTIME_TIMESTAMP\",\n                 \"__MONOTONIC_TIMESTAMP\", \"_SOURCE_MONOTONIC_TIMESTAMP\"\
  ,\n                 \"__CURSOR\", \"__SEQNUM\", \"__SEQNUM_ID\", \"_RUNTIME_SCOPE\",\n             \
  \    \"_SYSTEMD_CGROUP\", \"_SYSTEMD_SLICE\", \"_SYSTEMD_INVOCATION_ID\",\n                 \"_SYSTEMD_USER_SLICE\"\
  , \"_SYSTEMD_OWNER_UID\", \"_CAP_EFFECTIVE\",\n                 \"_AUDIT_SESSION\", \"_AUDIT_LOGINUID\"\
  , \"_STREAM_ID\",\n                 \"_LINE_BREAK\", \"_SYSTEMD_SESSION\", \"TID\", \"_FSUID\", \"_FSGID\"\
  }\n        row[\"not_normalized\"] = \", \".join(\n            sorted(x for x in e if x not in JUSED)[:25])\n\
  \n        # an IP right in the text (sshd \"from 192.0.2.10\", NetworkManager and so on)\n        ip\
  \ = re.search(r\"\\b(?:from|addr=|peer )\\s*((?:\\d{1,3}\\.){3}\\d{1,3})\", msg)\n        if ip:\n \
  \           row[\"source_ip\"] = ip.group(1)\n            row[\"related_ip\"] = ip.group(1)\n      \
  \  rows.append(row)\n    # --- WHO -> OVER WHAT (the single axis for reading an event) ---\n    for\
  \ r in rows:\n        if r.get(\"subject_type\"):\n            continue\n        cat = r.get(\"event_category\"\
  , \"\")\n        if r.get(\"user_name\"):\n            r[\"subject_type\"], r[\"subject_name\"] = \"\
  user\", r[\"user_name\"]\n        elif r.get(\"service_name\"):\n            r[\"subject_type\"], r[\"\
  subject_name\"] = \"service\", r[\"service_name\"]\n        elif r.get(\"process_name\"):\n        \
  \    r[\"subject_type\"], r[\"subject_name\"] = \"process\", r[\"process_name\"]\n        else:\n  \
  \          r[\"subject_type\"], r[\"subject_name\"] = \"system\", r.get(\"host_name\", \"\")\n     \
  \   if r.get(\"file_path\"):\n            r[\"object_type\"], r[\"object_name\"] = \"file\", r[\"file_path\"\
  ]\n        elif r.get(\"destination_ip\"):\n            r[\"object_type\"] = \"socket\"\n          \
  \  r[\"object_name\"] = \"%s:%s\" % (r[\"destination_ip\"], r.get(\"destination_port\") or \"\")\n \
  \       elif r.get(\"package_name\"):\n            r[\"object_type\"], r[\"object_name\"] = \"package\"\
  , r[\"package_name\"]\n        elif cat == \"process\" and r.get(\"process_executable\"):\n        \
  \    r[\"object_type\"], r[\"object_name\"] = \"process\", r[\"process_executable\"]\n        elif cat\
  \ in (\"authentication\", \"iam\"):\n            r[\"object_type\"] = \"account\"\n            r[\"\
  object_name\"] = r.get(\"user_target_name\") or r.get(\"user_name\", \"\")\n        elif r.get(\"service_name\"\
  ):\n            r[\"object_type\"], r[\"object_name\"] = \"service\", r[\"service_name\"]\n        else:\n\
  \            r[\"object_type\"], r[\"object_name\"] = \"\", \"\"\n    return rows\n"
