name: dev_packages
id: LS-N-28
type: normalization_rule
version: 3.0.0
title: Language packages
code: "def normalize(text):\n    rows = []\n    for line in text.splitlines():\n        f = line.split(\"\\t\")\n        if len(f) >= 2 and f[1]:\n            rows.append({\"kind\": f[0], \"name\": f[1],\n                         \"version\": f[2] if len(f) > 2 else \"\",\n                         \"description\": f[3] if len(f) > 3 else \"\"})\n    return rows\n"
