name: memory
id: LS-N-11
type: normalization_rule
version: 3.0.0
title: Memory
code: "def normalize(text):\n    def gb(x):\n        try:\n            return \"%g\" % round(float(x) / 1073741824.0, 1)\n        except Exception:\n            return \"0\"\n    rows = []\n    for line in text.splitlines():\n        f = line.split()\n        if len(f) >= 4 and f[0].endswith(\":\"):\n            rows.append({\n                \"kind\": f[0].replace(\":\", \"\"),\n                \"total_gb\": gb(f[1]), \"used_gb\": gb(f[2]), \"free_gb\": gb(f[3]),\n                \"available_gb\": gb(f[6]) if len(f) > 6 else \"\",\n            })\n    return rows\n"
