title: Net config
code: "def normalize(text):\n    rows = []\n    for line in text.splitlines():\n        f = line.split(\"\\t\", 1)\n        if len(f) >= 2:\n            rows.append({\"kind\": f[0], \"entry\": f[1].strip()})\n    return rows\n"
