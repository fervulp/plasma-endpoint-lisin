name: network
id: LS-N-13
type: normalization_rule
version: 3.0.0
title: Network interfaces
code: "def normalize(text):\n    ifaces, order = {}, []\n    for ln in text.splitlines():\n        parts = ln.split(\"\\t\", 1)\n        if len(parts) != 2:\n            continue\n        tag, body = parts[0], parts[1]\n        if tag == \"link\":\n            m = re.search(r'\\d+:\\s+(\\S+?)(?:@\\S+)?:\\s+<[^>]*>\\s+mtu\\s+(\\d+).*?state (\\S+)', body)\n            if not m:\n                continue\n            name = m.group(1)\n            macm = re.search(r'link/(\\w+)\\s+([0-9a-f:]{17})', body)\n            mac = macm.group(2) if macm else \"\"\n            kind = \"loopback\" if (macm and macm.group(1) == \"loopback\") else \"ether\"\n            km = re.search(r'\\btun type (\\w+)', body)\n            if km:\n                kind = km.group(1)\n            else:\n                for kw in (\"bridge\", \"vlan\", \"veth\", \"vxlan\", \"bond\",\n                           \"macvlan\", \"wireguard\", \"vrf\", \"gre\", \"sit\"):\n                    if re.search(r'\\b' + kw + r'\\b',\
  \ body):\n                        kind = kw\n                        break\n            pm = re.search(r'promiscuity (\\d+)', body)\n            promisc = \"yes\" if (pm and pm.group(1) != \"0\") else \"\"\n            ifaces[name] = {\"iface\": name, \"state\": m.group(3), \"mac\": mac,\n                            \"mtu\": m.group(2), \"kind\": kind, \"promisc\": promisc,\n                            \"ipv4\": \"\", \"ipv6\": \"\"}\n            order.append(name)\n        elif tag == \"addr\":\n            m = re.search(r'\\d+:\\s+(\\S+)\\s+inet(6?)\\s+(\\S+)', body)\n            if m and m.group(1) in ifaces:\n                key = \"ipv6\" if m.group(2) == \"6\" else \"ipv4\"\n                cur = ifaces[m.group(1)][key]\n                ifaces[m.group(1)][key] = (cur + \" \" + m.group(3)) if cur else m.group(3)\n    seen, rows = set(), []\n    for nm in order:\n        if nm not in seen:\n            seen.add(nm)\n            rows.append(ifaces[nm])\n    return rows\n"
