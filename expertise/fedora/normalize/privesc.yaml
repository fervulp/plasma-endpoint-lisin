name: privesc
id: LS-N-39
type: normalization_rule
version: 1.1.0
title: Privilege escalation surface
code: "def normalize(text):\n    # Dangerous capabilities: they give an effective root primitive.\n  \
  \  RISKY = (\"cap_setuid\", \"cap_setgid\", \"cap_dac_override\",\n             \"cap_dac_read_search\"\
  , \"cap_sys_admin\", \"cap_sys_ptrace\",\n             \"cap_sys_module\", \"cap_sys_rawio\", \"cap_net_admin\"\
  , \"cap_bpf\",\n             \"cap_perfmon\", \"cap_setfcap\", \"cap_chown\", \"cap_fowner\")\n    #\
  \ WHEN the vector appeared: the mtime of its carrier (the binary with the\n    # capability, the sudoers\
  \ file). Without the time one cannot tell a fresh vector\n    # planted by an attacker from a routine\
  \ setting that has been here for years.\n    import datetime\n    mt = {}\n    sect = \"\"\n    for\
  \ ln in text.split(\"\\n\"):\n        t = ln.strip()\n        if t.startswith(\"===\") and t.endswith(\"\
  ===\"):\n            sect = t.strip(\"=\")\n            continue\n        if sect == \"MTIME\" and \"\
  \\t\" in ln:\n            when, _, pth = ln.partition(\"\\t\")\n            mt[pth.strip()] = when.strip()[:19]\n\
  \    newest_sudoers = \"\"\n    for pth, when in mt.items():\n        if pth.startswith(\"/etc/sudoers\"\
  ) and when > newest_sudoers:\n            newest_sudoers = when\n\n    def age(when):\n        if not\
  \ when:\n            return \"\"\n        try:\n            d = datetime.datetime.strptime(when[:19],\
  \ \"%Y-%m-%d %H:%M:%S\")\n        except ValueError:\n            return \"\"\n        return str((datetime.datetime.now()\
  \ - d).days)\n\n    rows = []\n    section = \"\"\n    for ln in text.split(\"\\n\"):\n        s = ln.strip()\n\
  \        if s in (\"===CAPS===\", \"===SUDO===\", \"===SUDOERS===\",\n                     \"===MTIME===\"\
  ):\n            section = s.strip(\"=\")\n            continue\n        if s == \"\":\n            continue\n\
  \        if section == \"CAPS\":\n            # \"path capabilities\" - e.g. \"/usr/bin/ping cap_net_raw=ep\"\
  \n            parts = s.rsplit(\" \", 1)\n            path = parts[0]\n            caps = parts[1] if\
  \ len(parts) == 2 else \"\"\n            risky = any(c in caps for c in RISKY)\n            rows.append({\"\
  kind\": \"capability\", \"name\": path, \"detail\": caps,\n                         \"risk\": \"high\"\
  \ if risky else \"info\",\n                         \"nopasswd\": \"\", \"source\": \"getcap\",\n  \
  \                       \"changed\": mt.get(path, \"\"),\n                         \"age_days\": age(mt.get(path,\
  \ \"\"))})\n        elif section == \"SUDO\":\n            # rule lines: \"(runas) [NOPASSWD:] command\"\
  \n            m = re.search(r'\\(([^)]*)\\)\\s*(.+)$', s)\n            if not m:\n                continue\n\
  \            runas, rest = m.group(1), m.group(2)\n            nopass = \"yes\" if \"NOPASSWD\" in rest\
  \ else \"\"\n            cmd = re.sub(r'^\\s*(NOPASSWD|PASSWD|SETENV|NOEXEC|EXEC)\\s*:\\s*',\n     \
  \                    \"\", rest).strip()\n            # the rule came from a live sudo -l query; the\
  \ carrier is the sudoers\n            # files, so we take the time of the freshest of them\n       \
  \     rows.append({\"kind\": \"sudo\", \"name\": cmd,\n                         \"detail\": \"runas\
  \ \" + runas,\n                         \"risk\": \"high\" if nopass else \"info\",\n              \
  \           \"nopasswd\": nopass, \"source\": \"sudo -l\",\n                         \"changed\": newest_sudoers,\n\
  \                         \"age_days\": age(newest_sudoers)})\n        elif section == \"SUDOERS\":\n\
  \            # \"<file>\\t<rule line>\"\n            f = s.split(\"\\t\", 1)\n            if len(f)\
  \ != 2:\n                continue\n            src, rule = f[0], f[1].strip()\n            nopass =\
  \ \"yes\" if \"NOPASSWD\" in rule else \"\"\n            rows.append({\"kind\": \"sudoers\", \"name\"\
  : rule, \"detail\": \"\",\n                         \"risk\": \"high\" if nopass else \"info\",\n  \
  \                       \"nopasswd\": nopass, \"source\": src,\n                         \"changed\"\
  : mt.get(src, \"\"),\n                         \"age_days\": age(mt.get(src, \"\"))})\n    return rows\n"
