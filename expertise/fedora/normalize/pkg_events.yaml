name: pkg_events
id: LS-N-41
type: normalization_rule
version: 1.0.0
title: Package events → event taxonomy
code: "def normalize(text):\n    import datetime, socket\n    host = socket.gethostname()\n    rows =\
  \ []\n    for ln in text.splitlines():\n        f = ln.split(\"\\t\")\n        if len(f) < 3:\n    \
  \        continue\n        try:\n            ts = datetime.datetime.fromtimestamp(\n               \
  \ int(f[0]), datetime.timezone.utc).strftime(\"%Y-%m-%dT%H:%M:%SZ\")\n        except Exception:\n  \
  \          continue\n        name, ver = f[1], f[2]\n        rows.append({\n            \"ts\": ts,\n\
  \            # a stable id: package + version + installation time do not change\n            \"event_id\"\
  : \"rpm:\" + name + \":\" + ver + \":\" + f[0],\n            \"event_kind\": \"event\",\n          \
  \  \"event_category\": \"package\",\n            \"event_type\": \"installation\",\n            \"event_action\"\
  : \"package_installed\",\n            \"event_outcome\": \"success\",\n            \"event_severity\"\
  : 20,\n            \"event_module\": \"rpmdb\",\n            \"event_dataset\": \"rpm.installed\",\n\
  \            \"event_provider\": \"rpm\",\n            \"host_name\": host,\n            \"package_name\"\
  : name,\n            \"package_version\": ver,\n            \"message\": \"installed \" + name + \"\
  \ \" + ver,\n        })\n    # --- WHO -> OVER WHAT (the single axis for reading an event) ---\n   \
  \ for r in rows:\n        if r.get(\"subject_type\"):\n            continue\n        cat = r.get(\"\
  event_category\", \"\")\n        if r.get(\"user_name\"):\n            r[\"subject_type\"], r[\"subject_name\"\
  ] = \"user\", r[\"user_name\"]\n        elif r.get(\"service_name\"):\n            r[\"subject_type\"\
  ], r[\"subject_name\"] = \"service\", r[\"service_name\"]\n        elif r.get(\"process_name\"):\n \
  \           r[\"subject_type\"], r[\"subject_name\"] = \"process\", r[\"process_name\"]\n        else:\n\
  \            r[\"subject_type\"], r[\"subject_name\"] = \"system\", r.get(\"host_name\", \"\")\n   \
  \     if r.get(\"file_path\"):\n            r[\"object_type\"], r[\"object_name\"] = \"file\", r[\"\
  file_path\"]\n        elif r.get(\"destination_ip\"):\n            r[\"object_type\"] = \"socket\"\n\
  \            r[\"object_name\"] = \"%s:%s\" % (r[\"destination_ip\"], r.get(\"destination_port\") or\
  \ \"\")\n        elif r.get(\"package_name\"):\n            r[\"object_type\"], r[\"object_name\"] =\
  \ \"package\", r[\"package_name\"]\n        elif cat == \"process\" and r.get(\"process_executable\"\
  ):\n            r[\"object_type\"], r[\"object_name\"] = \"process\", r[\"process_executable\"]\n  \
  \      elif cat in (\"authentication\", \"iam\"):\n            r[\"object_type\"] = \"account\"\n  \
  \          r[\"object_name\"] = r.get(\"user_target_name\") or r.get(\"user_name\", \"\")\n        elif\
  \ r.get(\"service_name\"):\n            r[\"object_type\"], r[\"object_name\"] = \"service\", r[\"service_name\"\
  ]\n        else:\n            r[\"object_type\"], r[\"object_name\"] = \"\", \"\"\n    return rows\n"
