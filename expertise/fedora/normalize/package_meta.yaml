name: package_meta
id: LS-N-61
type: normalization_rule
version: 1.0.0
title: Package descriptions and desktop entries
code: |
  def normalize(text):
      head, _, desk = text.partition("===DESKTOP===")
      rows, by_name = [], {}
      for line in head.splitlines():
          f = line.split("\t")
          if len(f) < 2 or not f[0].strip():
              continue
          r = {"name": f[0], "summary": f[1],
               "url": (f[2] if len(f) > 2 and f[2] != "(none)" else ""),
               "group": (f[3] if len(f) > 3 and f[3] != "Unspecified" else ""),
               "category": "", "purpose": "", "desktop": ""}
          rows.append(r)
          by_name[f[0]] = r

      # A .desktop entry describes a program for a human. We attach it to the
      # package by the basename of Exec and by the name of the .desktop file -
      # a package name matches neither often enough (telegram-desktop/Telegram).
      for line in desk.splitlines():
          f = line.split("\t")
          if len(f) < 5:
              continue
          path, disp, comment, cats, ex = f[0], f[1], f[2], f[3], f[4]
          stem = path.rsplit("/", 1)[-1][:-len(".desktop")]
          binary = ""
          for tok in ex.split():
              if tok.startswith("%") or "=" in tok:
                  continue
              binary = tok.rsplit("/", 1)[-1]
              break
          hit = None
          for key in (stem, binary, stem.rsplit(".", 1)[-1]):
              if key and key in by_name:
                  hit = by_name[key]
                  break
          if hit is None:
              # a desktop entry without an rpm package of the same name is still
              # a program on this machine (flatpak, appimage) - we keep the row
              hit = {"name": stem, "summary": "", "url": "", "group": "",
                     "category": "", "purpose": "", "desktop": ""}
              rows.append(hit)
              by_name[stem] = hit
          hit["category"] = cats
          hit["purpose"] = comment or disp
          hit["desktop"] = path
      return rows
tests:
  - name: an rpm line becomes a row
    input: "btop\tResource monitor\thttps://example.com\tApplications\n"
    expect:
      rows: 1
      contains: {name: btop, summary: Resource monitor, url: "https://example.com"}
  - name: a desktop entry describes the package for a human
    input: "btop\tResource monitor\t(none)\tUnspecified\n===DESKTOP===\n/usr/share/applications/btop.desktop\tbtop\tMonitor of resources\tSystem;Monitor;\t/usr/bin/btop\n"
    expect:
      rows: 1
      contains: {name: btop, purpose: Monitor of resources, category: "System;Monitor;"}
