name: browser_extensions
id: LS-N-57
type: normalization_rule
version: 1.1.0
title: Browser extensions
code: "def normalize(text):\n    # ONE ext_id may occur SEVERAL times in a profile (a copy in the profile\
  \ and a\n    # copy in the system directory, different versions). The last record used to win\n    #\
  \ and overwrote the previous one - together with the evidence: one copy had\n    # sourceURI file:///tmp/...,\
  \ the other had none, and the sign was lost.\n    # So the copies are MERGED: a non-empty value is not\
  \ overwritten by an empty one.\n    acc = {}\n    order = []\n    for ln in text.splitlines():\n   \
  \     f = ln.split(\"\\t\")\n        if not f or f[0] != \"EXT\" or len(f) < 15:\n            continue\n\
  \        (_, browser, profile, family, ext_id, name, version, enabled,\n         kind, origin, installed,\
  \ perms, origins, source_url, path) = f[:15]\n        # FACTS, not a verdict: an extension sees every\
  \ page if it has access to all\n        # domains; \"from where\" is what it was installed from.\n \
  \       all_sites = \"yes\" if (\"<all_urls>\" in origins or \"*://*/*\" in origins\n              \
  \                or \"http://*/*\" in origins) else \"\"\n        # the alarming sign is not a list\
  \ of \"bad names\" but a MISMATCH: the extension\n        # is declared as a system one but came from\
  \ a temporary directory\n        temp_src = \"yes\" if source_url.startswith((\"file:///tmp\",\n   \
  \                                                \"file:///var/tmp\",\n                            \
  \                       \"file:///dev/shm\")) else \"\"\n        row = {\"browser\": browser, \"profile\"\
  : profile, \"name\": name,\n               \"enabled\": enabled, \"origin\": origin, \"all_sites\":\
  \ all_sites,\n               \"from_temp\": temp_src, \"permissions\": perms,\n               \"host_permissions\"\
  : origins, \"version\": version,\n               \"installed\": installed, \"copies\": \"1\", \"ext_id\"\
  : ext_id,\n               \"family\": family, \"kind\": kind, \"source_url\": source_url,\n        \
  \       \"path\": path}\n        k = (browser, profile, ext_id)\n        old = acc.get(k)\n        if\
  \ old is None:\n            acc[k] = row\n            order.append(k)\n            continue\n      \
  \  old[\"copies\"] = str(int(old[\"copies\"]) + 1)\n        for col, val in row.items():\n         \
  \   if col == \"copies\":\n                continue\n            if not str(old.get(col) or \"\").strip()\
  \ and str(val).strip():\n                old[col] = val\n            elif col == \"version\" and val\
  \ and val not in old[\"version\"]:\n                old[\"version\"] = old[\"version\"] + \", \" + val\n\
  \    return [acc[k] for k in order]\n"
