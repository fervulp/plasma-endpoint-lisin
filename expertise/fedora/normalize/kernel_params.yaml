name: kernel_params
id: LS-N-40
type: normalization_rule
version: 2.0.1
title: Kernel parameters vs declared configuration
code: "def normalize(text):\n    \"\"\"Comparing \"declared in the configuration\" with \"actually in\
  \ the kernel\".\n\n    File priority follows the sysctl.d rules: the same file NAME in /etc overrides\n\
  \    /run and /usr/lib; then the files are applied in name order, so a later one\n    overrides an earlier\
  \ one; /etc/sysctl.conf is applied last.\n    \n    \"\"\"\n    import os\n    running, declared_raw\
  \ = {}, []\n    sect = \"\"\n    for ln in text.splitlines():\n        s = ln.rstrip()\n        if s.startswith(\"\
  ===\") and s.endswith(\"===\"):\n            sect = s.strip(\"=\")\n            continue\n        if\
  \ sect == \"RUNNING\" and \"\\t\" in s:\n            k, _, v = s.partition(\"\\t\")\n            running[k.strip()]\
  \ = v.strip()\n        elif sect == \"DECLARED\" and \"\\t\" in s:\n            path, _, body = s.partition(\"\
  \\t\")\n            body = body.strip()\n            if not body or body.startswith((\"#\", \";\")):\n\
  \                continue\n            if \"=\" not in body:\n                continue\n           \
  \ k, _, v = body.partition(\"=\")\n            declared_raw.append((path, k.strip().lstrip(\"-\"), v.strip()))\n\
  \n    PRIO = {\"/etc/sysctl.d\": 3, \"/run/sysctl.d\": 2, \"/usr/lib/sysctl.d\": 1}\n\n    def rank(path):\n\
  \        d = os.path.dirname(path)\n        if path == \"/etc/sysctl.conf\":\n            return (2,\
  \ \"\", 9)       # applied last\n        return (1, os.path.basename(path), PRIO.get(d, 0))\n\n    #\
  \ For the same file NAME we keep the copy from the directory with the highest\n    # priority (/etc\
  \ > /run > /usr/lib). Inside we apply them in the order the input\n    # returned them: the directories\
  \ are listed in ascending priority, and inside a\n    # directory glob sorts by name - that is, the\
  \ last declaration wins, exactly as\n    # sysctl itself does.\n    best = {}\n    for path, k, v in\
  \ declared_raw:\n        stage, base, prio = rank(path)\n        cur = best.get((stage, base))\n   \
  \     if cur is None or prio >= cur[0]:\n            best[(stage, base)] = (prio, path)\n    winners\
  \ = {p for _, p in best.values()}\n\n    declared = {}\n    for path, k, v in declared_raw:\n      \
  \  if path in winners:\n            declared[k] = (v, path)\n\n    # sysctl.d allows PATTERNS (net.ipv4.conf.*.rp_filter)\
  \ - the kernel expands them\n    # over all interfaces. Without expanding, such a parameter would look\
  \ \"not\n    # applied\" although it is applied to every interface.\n    import fnmatch\n    expanded\
  \ = {}\n    for k, (want, path) in declared.items():\n        if \"*\" not in k:\n            expanded[k]\
  \ = (want, path)\n            continue\n        hits = fnmatch.filter(running.keys(), k)\n        for\
  \ h in hits:\n            expanded.setdefault(h, (want, path))\n        if not hits:\n            expanded[k]\
  \ = (want, path)\n    declared = expanded\n\n    rows = []\n    for k in sorted(declared):\n       \
  \ want, path = declared[k]\n        have = running.get(k, \"\")\n        # the values may differ in\
  \ spaces/tabs (lists in net.*)\n        norm_w = \" \".join(want.split())\n        norm_h = \" \".join(have.split())\n\
  \        if k not in running:\n            status = \"not applied\"\n        elif norm_w == norm_h:\n\
  \            status = \"ok\"\n        else:\n            status = \"differs\"\n        rows.append({\"\
  status\": status, \"param\": k, \"value\": have,\n                     \"declared\": want, \"declared_in\"\
  : path})\n    return rows\n"
