name: ports
id: LS-N-3
type: normalization_rule
version: 4.0.0
title: Network sockets
code: "def normalize(text):\n    parts = text.split(\"---FWPORTS---\")\n    lines = parts[0].split(\"\\\
  n\")\n    fw = parts[1] if len(parts) > 1 else \"\"\n    fwsingle, fwranges = {}, []\n    for tok in\
  \ re.split(r'\\s+', fw):\n        m = re.match(r'^(\\d+)(-(\\d+))?/(tcp|udp)$', tok)\n        if not\
  \ m:\n            continue\n        if m.group(3):\n            fwranges.append({\"lo\": int(m.group(1)),\
  \ \"hi\": int(m.group(3)),\n                             \"proto\": m.group(4)})\n        else:\n  \
  \          fwsingle[m.group(1) + \"/\" + m.group(4)] = True\n    rows = []\n    for ln in lines:\n \
  \       f = re.split(r'\\s+', ln.strip())\n        if len(f) < 6:\n            continue\n        proto,\
  \ state, local, peer = f[0], f[1], f[4], f[5]\n        pm = re.search(r'\"([^\"]+)\",pid=(\\d+)', ln)\n\
  \        proc = (pm.group(1) + \" (\" + pm.group(2) + \")\") if pm else \"\"\n        proto3 = proto.replace(\"\
  tcp6\", \"tcp\").replace(\"udp6\", \"udp\")[:3]\n        is_listen = state == \"LISTEN\" or peer.endswith(\"\
  :*\") or peer == \"*:*\"\n        remote, exposure = \"\", \"\"\n        if is_listen:\n           \
  \ li = local.split(\":\")\n            port = li[-1]\n            addr = \":\".join(li[:-1])\n     \
  \       external = addr in (\"0.0.0.0\", \"*\", \"::\", \"[::]\")\n            if not external:\n  \
  \              external = (not addr.startswith(\"127.\")\n                            and not addr.startswith(\"\
  [::1]\")\n                            and addr != \"\" and addr != \"::1\")\n            exposure =\
  \ \"local-only\"\n            if external:\n                try:\n                    pn = int(port)\n\
  \                except Exception:\n                    pn = -1\n                allowed = fwsingle.get(port\
  \ + \"/\" + proto3, False) is True\n                if not allowed:\n                    for rg in fwranges:\n\
  \                        if rg[\"lo\"] <= pn <= rg[\"hi\"] and rg[\"proto\"] == proto3:\n          \
  \                  allowed = True\n                exposure = \"OPEN (exposed)\" if allowed else \"\
  filtered (firewall)\"\n        else:\n            remote = peer\n            exposure = \"established\"\
  \n        # The address and the PORT as separate columns: people group and filter by the\n        #\
  \ port number all the time (\"who else listens on 8080\"), and from the string\n        # \"0.0.0.0:21027\"\
  \ there is nothing to do it with. The columns existed in the\n        # table but were empty - we fill\
  \ them by parsing, not with a separate source.\n        _a, _, _p = local.rpartition(\":\")\n      \
  \  rows.append({\"proto\": proto, \"state\": state, \"local\": local,\n                     \"addr\"\
  : _a, \"port\": _p,\n                     \"remote\": remote, \"process\": proc, \"exposure\": exposure})\n\
  \    return rows\n"
