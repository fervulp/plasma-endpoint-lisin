name: proc_events
id: LS-N-42
type: normalization_rule
version: 1.0.0
title: Process start/stop → event taxonomy
# Diff снимков процессов. Ключ процесса — pid + starttime из /proc/PID/stat
# (22-е поле, тики с загрузки): переиспользованный PID не считается тем же
# процессом. Состояние между прогонами — ~/.local/share/lisin/proc_seen.json.
code: |
  def normalize(text):
      import datetime, json as _j, os, socket
      from pathlib import Path

      STATE = Path.home() / ".local/share/lisin/proc_seen.json"
      host = socket.gethostname()
      now = datetime.datetime.now(datetime.timezone.utc)

      def boot_id():
          try:
              return open("/proc/sys/kernel/random/boot_id").read().strip()
          except OSError:
              return ""

      def starttime(pid):
          """Поле 22 из /proc/PID/stat — тики с загрузки. Стабильный ключ:
          отличает НОВЫЙ процесс от переиспользованного PID."""
          try:
              data = open("/proc/%s/stat" % pid).read()
              tail = data[data.rfind(")") + 2:].split()
              return tail[19] if len(tail) > 19 else ""
          except (OSError, IndexError):
              return ""

      cur = {}
      for ln in text.splitlines():
          f = ln.strip().split(None, 3)
          if len(f) < 4:
              continue
          pid, ppid, user, cmd = f[0], f[1], f[2], f[3]
          if not pid.isdigit():
              continue
          cur[pid] = {"pid": pid, "ppid": ppid, "user": user,
                      "cmd": cmd[:400], "st": starttime(pid)}

      prev, prev_boot = {}, ""
      try:
          saved = _j.loads(STATE.read_text())
          prev, prev_boot = saved.get("procs", {}), saved.get("boot", "")
      except Exception:
          pass

      bid = boot_id()
      try:
          STATE.parent.mkdir(parents=True, exist_ok=True)
          STATE.write_text(_j.dumps({"boot": bid, "procs": cur}))
      except OSError:
          pass

      # первый прогон (или перезагрузка) — базовая линия, событий не плодим
      if not prev or prev_boot != bid:
          return []

      ts = now.strftime("%Y-%m-%dT%H:%M:%SZ")
      rows = []

      def base(cmd):
          cmd = (cmd or "").strip()
          if not cmd or cmd.startswith("["):
              return cmd.strip("[]").split("/")[0][:40]
          return cmd.split(None, 1)[0].rsplit("/", 1)[-1][:40]

      def mk(p, started):
          exe = ""
          if started:
              try:
                  exe = os.readlink("/proc/%s/exe" % p["pid"]).split(" (deleted)")[0]
              except OSError:
                  exe = ""
          tok = (p.get("cmd") or "").split(None, 1)[0]
          kernel = (p.get("cmd") or "").strip().startswith("[")
          sev = 20 if started else 15
          if started and exe:
              if exe.startswith(("/tmp/", "/dev/shm/", "/var/tmp/")):
                  sev = 70
              elif exe.startswith(os.path.expanduser("~")) and "/.local/bin" not in exe:
                  sev = 45
          if p.get("user") == "root" and started:
              sev += 5
          return {
              "ts": ts,
              "event_id": "proc:%s:%s:%s:%s" % (bid[:8], p["pid"], p.get("st", ""),
                                                "start" if started else "end"),
              "event_kind": "event",
              "event_category": "process",
              "event_type": "start" if started else "end",
              "event_action": "process_started" if started else "process_ended",
              "event_outcome": "success",
              "event_severity": min(100, sev),
              "event_module": "procmon",
              "event_dataset": "proc.diff",
              "event_provider": "procmon",
              "host_name": host,
              "host_boot_id": bid,
              "user_name": p.get("user", ""),
              "related_user": p.get("user", ""),
              "process_pid": p["pid"],
              "parent_pid": p.get("ppid", ""),
              "process_name": base(p.get("cmd")),
              "process_executable": exe or (tok if tok.startswith("/") else ""),
              "process_command_line": p.get("cmd", ""),
              "message": ("started " if started else "exited ") + (p.get("cmd") or "")[:200],
              "tags": "kernel-thread" if kernel else "",
          }

      for pid, p in cur.items():
          old = prev.get(pid)
          if old is None or old.get("st") != p.get("st"):
              rows.append(mk(p, True))          # новый процесс (или PID переиспользован)
      for pid, p in prev.items():
          if pid not in cur:
              rows.append(mk(p, False))         # процесс исчез
      # --- КТО → НАД ЧЕМ (единая ось для чтения события) ---
      for r in rows:
          if r.get("subject_type"):
              continue
          cat = r.get("event_category", "")
          if r.get("user_name"):
              r["subject_type"], r["subject_name"] = "user", r["user_name"]
          elif r.get("service_name"):
              r["subject_type"], r["subject_name"] = "service", r["service_name"]
          elif r.get("process_name"):
              r["subject_type"], r["subject_name"] = "process", r["process_name"]
          else:
              r["subject_type"], r["subject_name"] = "system", r.get("host_name", "")
          if r.get("file_path"):
              r["object_type"], r["object_name"] = "file", r["file_path"]
          elif r.get("destination_ip"):
              r["object_type"] = "socket"
              r["object_name"] = "%s:%s" % (r["destination_ip"], r.get("destination_port") or "")
          elif r.get("package_name"):
              r["object_type"], r["object_name"] = "package", r["package_name"]
          elif cat == "process" and r.get("process_executable"):
              r["object_type"], r["object_name"] = "process", r["process_executable"]
          elif cat in ("authentication", "iam"):
              r["object_type"] = "account"
              r["object_name"] = r.get("user_target_name") or r.get("user_name", "")
          elif r.get("service_name"):
              r["object_type"], r["object_name"] = "service", r["service_name"]
          else:
              r["object_type"], r["object_name"] = "", ""
      return rows
