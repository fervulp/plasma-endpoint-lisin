name: pam_config
id: LS-N-49
type: normalization_rule
version: 1.1.0
title: PAM configuration
code: |
  def normalize(text):
      rows = []
      parts = text.split("===")
      for i in range(1, len(parts) - 1, 2):
          svc, body = parts[i].strip(), parts[i + 1]
          for n, ln in enumerate(body.splitlines()):
              s = ln.strip()
              if not s or s.startswith("#"):
                  continue
              f = s.split(None, 2)
              if len(f) < 2:
                  continue
              rows.append({"service": svc, "line_no": str(n), "type": f[0],
                           "control": f[1], "module": f[2] if len(f) > 2 else "",
                           "risk": "high" if ("nullok" in s or "pam_permit" in s) else ""})
      return rows
