name: file_integrity
id: LS-N-43
type: normalization_rule
version: 1.1.0
title: File integrity → event taxonomy
code: "def normalize(text):\n    import datetime, os, socket\n    host = socket.gethostname()\n    ts\
  \ = datetime.datetime.now(datetime.timezone.utc).strftime(\"%Y-%m-%dT%H:%M:%SZ\")\n\n    # the flag\
  \ positions of rpm -V: S size, M mode, 5 checksum, D device,\n    # L symlink, U owner, G group, T time,\
  \ P capabilities\n    FLAG = [(\"S\", \"size\"), (\"M\", \"mode\"), (\"5\", \"checksum\"), (\"D\", \"\
  device\"),\n            (\"L\", \"symlink\"), (\"U\", \"owner\"), (\"G\", \"group\"), (\"T\", \"mtime\"\
  ),\n            (\"P\", \"caps\")]\n    rows = []\n    for ln in text.splitlines():\n        ln = ln.rstrip()\n\
  \        if not ln.strip():\n            continue\n        note = \"\"\n        if \"(Permission denied)\"\
  \ in ln:\n            note = \"no access\"\n            ln = ln.replace(\" (Permission denied)\", \"\
  \")\n        missing = ln.startswith(\"missing\")\n        if missing:\n            rest = ln[len(\"\
  missing\"):].strip()\n            flags = \"\"\n        else:\n            flags, rest = ln[:9], ln[9:].strip()\n\
  \            if len(ln) < 10:\n                continue\n        # an optional file type mark: c (config),\
  \ d (doc), g (ghost)...\n        ftype = \"\"\n        if len(rest) > 2 and rest[1] == \" \" and rest[0]\
  \ in \"cdglrs\":\n            ftype, rest = rest[0], rest[2:].strip()\n        path = rest\n       \
  \ if not path.startswith(\"/\"):\n            continue\n        changed = [name for ch, name in FLAG\
  \ if ch in flags]\n        if missing:\n            action, sev = \"file_missing\", 60\n        elif\
  \ \"checksum\" in changed or \"size\" in changed:\n            action, sev = \"file_modified\", 55\n\
  \        elif \"mode\" in changed or \"owner\" in changed or \"group\" in changed:\n            action,\
  \ sev = \"file_permissions_changed\", 65\n        elif \"caps\" in changed:\n            action, sev\
  \ = \"file_caps_changed\", 75\n        elif changed:\n            action, sev = \"file_touched\", 25\n\
  \        else:\n            action, sev = \"file_unverified\", 15\n        if note:\n            sev\
  \ = 15                      # we could not read it - that is not a finding\n        # the actual mode/owner\
  \ comes from the filesystem (rpm only says \"differs\")\n        mode = owner = \"\"\n        try:\n\
  \            import pwd as _pwd\n            st = os.stat(path)\n            mode = oct(st.st_mode &\
  \ 0o7777)[2:].rjust(4, \"0\")\n            try:\n                owner = _pwd.getpwuid(st.st_uid).pw_name\n\
  \            except KeyError:\n                owner = str(st.st_uid)\n        except OSError:\n   \
  \         pass\n        name = path.rsplit(\"/\", 1)[-1]\n        rows.append({\n            \"ts\"\
  : ts,\n            # while the set of differences is the same there is one event (dedup by event_id)\n\
  \            \"event_id\": \"fim:%s:%s:%s\" % (path, flags or \"missing\", note),\n            \"event_kind\"\
  : \"event\",\n            \"event_category\": \"file\",\n            \"event_type\": \"change\",\n \
  \           \"event_action\": action,\n            \"event_outcome\": \"success\" if not note else \"\
  unknown\",\n            \"event_severity\": sev,\n            \"event_module\": \"fim\",\n         \
  \   \"event_dataset\": \"rpm.verify\",\n            \"event_provider\": \"rpm\",\n            \"host_name\"\
  : host,\n            \"file_path\": path,\n            \"file_name\": name,\n            \"file_directory\"\
  : path.rsplit(\"/\", 1)[0] if \"/\" in path else \"\",\n            \"file_extension\": name.rsplit(\"\
  .\", 1)[-1] if \".\" in name else \"\",\n            \"file_mode\": mode,\n            \"file_owner\"\
  : owner,\n            \"message\": (\"config \" if ftype == \"c\" else \"\") +\n                   \
  \    ((\"missing: \" + path) if missing\n                        else (\"changed [\" + \", \".join(changed)\
  \ + \"]: \" + path\n                              if changed else \"not verified: \" + path))\n    \
  \                   + ((\" (\" + note + \")\") if note else \"\"),\n            \"not_normalized\":\
  \ \"\",\n        })\n    # --- WHO -> OVER WHAT (the single axis for reading an event) ---\n    for\
  \ r in rows:\n        if r.get(\"subject_type\"):\n            continue\n        cat = r.get(\"event_category\"\
  , \"\")\n        if r.get(\"user_name\"):\n            r[\"subject_type\"], r[\"subject_name\"] = \"\
  user\", r[\"user_name\"]\n        elif r.get(\"service_name\"):\n            r[\"subject_type\"], r[\"\
  subject_name\"] = \"service\", r[\"service_name\"]\n        elif r.get(\"process_name\"):\n        \
  \    r[\"subject_type\"], r[\"subject_name\"] = \"process\", r[\"process_name\"]\n        else:\n  \
  \          r[\"subject_type\"], r[\"subject_name\"] = \"system\", r.get(\"host_name\", \"\")\n     \
  \   if r.get(\"file_path\"):\n            r[\"object_type\"], r[\"object_name\"] = \"file\", r[\"file_path\"\
  ]\n        elif r.get(\"destination_ip\"):\n            r[\"object_type\"] = \"socket\"\n          \
  \  r[\"object_name\"] = \"%s:%s\" % (r[\"destination_ip\"], r.get(\"destination_port\") or \"\")\n \
  \       elif r.get(\"package_name\"):\n            r[\"object_type\"], r[\"object_name\"] = \"package\"\
  , r[\"package_name\"]\n        elif cat == \"process\" and r.get(\"process_executable\"):\n        \
  \    r[\"object_type\"], r[\"object_name\"] = \"process\", r[\"process_executable\"]\n        elif cat\
  \ in (\"authentication\", \"iam\"):\n            r[\"object_type\"] = \"account\"\n            r[\"\
  object_name\"] = r.get(\"user_target_name\") or r.get(\"user_name\", \"\")\n        elif r.get(\"service_name\"\
  ):\n            r[\"object_type\"], r[\"object_name\"] = \"service\", r[\"service_name\"]\n        else:\n\
  \            r[\"object_type\"], r[\"object_name\"] = \"\", \"\"\n    return rows\n"
