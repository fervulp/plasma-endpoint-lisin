name: attach_package
id: LS-E-21
type: enrichment
version: 1.0.0
title: Attach owning package (universal link)
# THE UNIVERSAL LINKING NODE. It adds a package column to the tables that have a
# path/unit/module that can be tied to a package through rpm. After that the
# table links to applications.name and through it to the whole graph.
# One node for several flows (suid, privesc, scheduled, services,
# kernel_modules): the logic is in the expertise, not in the code.
code: |
  # A shared cache of the file->package index: built once per process, refreshed by
  # the mtime of the rpm database. Kept in a module dictionary so as not to reread
  # 36 MB for every table.
  _PKG_IDX = {}
  _PKG_STAMP = [""]


  def _pkg_index():
      import json, os, subprocess
      from pathlib import Path
      try:
          stamp = str(os.path.getmtime("/var/lib/rpm/rpmdb.sqlite"))
      except OSError:
          stamp = "0"
      if _PKG_STAMP[0] == stamp and _PKG_IDX:
          return _PKG_IDX
      cache = Path.home() / ".local/share/lisin/filepkg.json"
      idx = None
      try:
          c = json.loads(cache.read_text())
          if c.get("_stamp") == stamp:
              idx = c.get("idx")
      except Exception:
          idx = None
      if idx is None:
          idx = {}
          try:
              out = subprocess.run(["rpm", "-qa", "--qf", "[%{FILENAMES}\t%{=NAME}\n]"],
                                   capture_output=True, text=True, timeout=180).stdout
          except Exception:
              out = ""
          for ln in out.splitlines():
              f = ln.split("\t", 1)
              if len(f) == 2:
                  idx[f[0]] = f[1]
          try:
              cache.write_text(json.dumps({"_stamp": stamp, "idx": idx}))
          except OSError:
              pass
      _PKG_IDX.clear()
      _PKG_IDX.update(idx)
      _PKG_STAMP[0] = stamp
      return _PKG_IDX


  def enrich(rows):
      """Tie a row to a PACKAGE - the universal linking node between tables.

      After that the table links to applications.name (the inventory) and through
      it to everything else. The package is derived in three ways, all from the system:
        * a PATH value - straight from the rpm index (taking the merged /usr into
          account: /usr/sbin/x is a symlink to /usr/bin/x, the package records the latter);
        * a UNIT value (*.service/*.timer/*.socket) - through FragmentPath;
        * a kernel MODULE value - through the path /lib/modules/.../name.ko.
      No lists of names: only a comparison with what the system itself declared.
      """
      import os
      import subprocess
      idx = _pkg_index()

      def by_path(p):
          if p in idx:
              return idx[p]
          try:
              rp = os.path.realpath(p)
          except OSError:
              rp = ""
          return idx.get(rp, "")

      # collect the units and modules for a batch resolve (one call each is expensive)
      units, mods = set(), set()
      for r in rows:
          for v in r.values():
              v = str(v or "")
              if v.endswith((".service", ".timer", ".socket", ".mount", ".path")):
                  units.add(v)
      unit_pkg = {}
      for u in list(units)[:400]:
          try:
              fp = subprocess.run(["systemctl", "show", "-p", "FragmentPath",
                                   "--value", u], capture_output=True, text=True,
                                  timeout=5).stdout.strip()
              if fp:
                  unit_pkg[u] = by_path(fp)
          except Exception:
              pass

      for r in rows:
          pkg = ""
          # 1) any path value
          for v in r.values():
              v = str(v or "")
              if v.startswith("/"):
                  pkg = by_path(v)
                  if pkg:
                      break
          # 2) a unit
          if not pkg:
              for v in r.values():
                  if str(v) in unit_pkg:
                      pkg = unit_pkg[str(v)]
                      if pkg:
                          break
          # 3) a kernel module (by its short name)
          if not pkg and r.get("name") and "/" not in str(r.get("name")):
              nm = str(r["name"]).replace("-", "_")
              try:
                  kp = subprocess.run(["modinfo", "-F", "filename", nm],
                                      capture_output=True, text=True,
                                      timeout=4).stdout.strip()
                  if kp.startswith("/"):
                      pkg = by_path(kp) or by_path(kp.replace(".xz", "").replace(".zst", ""))
              except Exception:
                  pass
          r["package"] = pkg
      return rows
