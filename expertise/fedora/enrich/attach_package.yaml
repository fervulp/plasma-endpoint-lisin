name: attach_package
id: LS-E-21
type: enrichment
version: 3.0.0
title: Attach owning package (universal link)
# THE UNIVERSAL LINKING NODE. It adds a package column to the tables that have a
# path/unit/module that can be tied to a package. After that the table links to
# applications.name and through it to the whole graph. One node for several
# flows (suid, privesc, scheduled, services, kernel_modules): the logic is in
# the expertise, not in the code.
#
# VERSION 3: NOT A SINGLE COMMAND IS RUN HERE ANY MORE. It used to call rpm to
# build the file index, systemctl to resolve a unit and modinfo to resolve a
# kernel module. That broke principle 1: an enrichment links data that has
# already been collected, while collecting is the job of an input - only then is
# the source visible in the pipeline, can be switched off and can be run by hand.
#
# Now everything is one lookup in the package_files table, which its own flow
# fills (fedora/inputs/package_files). Three resolutions, all from that table:
#   * a PATH value    - directly, taking the merged /usr into account
#                       (/usr/sbin/x is a symlink to /usr/bin/x);
#   * a UNIT value    - the unit file itself is a packaged file, so we look for a
#                       path ending with /<unit>. systemctl is not needed;
#   * a kernel MODULE - its .ko file is a packaged file too, so we look for a
#                       path ending with /<name>.ko*. modinfo is not needed.
# It is also faster: reading the index takes 18 ms instead of the ~1 s that
# running rpm cost, and there is no per-unit systemctl call at all.
code: |
  _CACHE = {}


  def _index(db_path):
      """path -> package, plus lookups by unit file name and by module name.

      Read once per process and reused: the table changes only when packages
      change, and it is read by seven flows.
      """
      import os
      import sqlite3
      try:
          sig = os.path.getmtime(db_path)
      except OSError:
          sig = 0
      hit = _CACHE.get("idx")
      if hit and hit[0] == sig:
          return hit[1]
      by_path, by_unit, by_mod = {}, {}, {}
      try:
          con = sqlite3.connect("file:%s?mode=ro" % db_path, uri=True, timeout=5)
          for path, pkg in con.execute("SELECT path, package FROM package_files"):
              if not path or not pkg:
                  continue
              by_path[path] = pkg
              base = path.rsplit("/", 1)[-1]
              if base.endswith((".service", ".timer", ".socket", ".mount", ".path")):
                  by_unit.setdefault(base, pkg)
              elif ".ko" in base:
                  mod = base.split(".ko")[0].replace("-", "_")
                  by_mod.setdefault(mod, pkg)
          con.close()
      except Exception:
          pass
      idx = (by_path, by_unit, by_mod)
      _CACHE["idx"] = (sig, idx)
      return idx


  def enrich(rows):
      """Tie a row to a PACKAGE - the universal linking node between tables."""
      import os
      from pathlib import Path
      by_path, by_unit, by_mod = _index(
          str(Path.home() / ".local/share/lisin/state.db"))
      if not by_path:
          return rows

      def path_pkg(p):
          pkg = by_path.get(p)
          if pkg:
              return pkg
          # the merged /usr: a package records /usr/bin/x while the row may hold
          # /usr/sbin/x or /bin/x - the same file through a symlink
          try:
              rp = os.path.realpath(p)
          except OSError:
              rp = ""
          return by_path.get(rp, "")

      for r in rows:
          pkg = ""
          # 1) any path value
          for v in r.values():
              v = str(v or "")
              if v.startswith("/"):
                  pkg = path_pkg(v)
                  if pkg:
                      break
          # 2) a unit: its unit file belongs to a package
          if not pkg:
              for v in r.values():
                  v = str(v or "")
                  if v.endswith((".service", ".timer", ".socket", ".mount", ".path")):
                      pkg = by_unit.get(v, "")
                      if pkg:
                          break
          # 3) a kernel module: its .ko file belongs to a package
          if not pkg:
              nm = str(r.get("name") or "")
              if nm and "/" not in nm:
                  pkg = by_mod.get(nm.replace("-", "_"), "")
          if pkg:
              r["package"] = pkg
          else:
              r.setdefault("package", "")
      return rows
