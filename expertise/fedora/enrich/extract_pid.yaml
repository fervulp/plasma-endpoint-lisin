name: extract_pid
id: LS-E-22
type: enrichment
version: 1.0.0
title: Extract PID from owner string (link to processes)
# Достаёт pid из строки владельца («code (520126)») в отдельную колонку,
# чтобы таблица связывалась с processes.pid и вставала в общий граф.
code: |
  def enrich(rows):
      """Выделить PID из строки владельца в отдельную колонку.

      ss/lsof печатают владельца как «code (520126)» — pid внутри текста, и по
      нему нельзя соединить с processes.pid. Достаём число регуляркой, чтобы
      таблица встала в общий граф через процесс.
      """
      for r in rows:
          pid = ""
          for v in (r.get("process"), r.get("owner"), r.get("owner_cmd")):
              m = re.search(r"\((\d+)\)", str(v or ""))
              if m:
                  pid = m.group(1)
                  break
          r["pid"] = pid
      return rows
