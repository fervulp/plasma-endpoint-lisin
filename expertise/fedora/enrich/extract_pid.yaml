name: extract_pid
id: LS-E-22
type: enrichment
version: 1.0.0
title: Extract PID from owner string (link to processes)
# Extracts the pid from the owner string ("code (520126)") into its own column so
# that the table links to processes.pid and joins the common graph.
code: |
  def enrich(rows):
      """Extract the PID from the owner string into its own column.

      ss/lsof print the owner as "code (520126)" - the pid is inside the text and
      cannot be joined with processes.pid. We pull the number out with a regex so
      that the table joins the common graph through the process.
      """
      for r in rows:
          pid = ""
          for v in (r.get("process"), r.get("owner"), r.get("owner_cmd")):
              m = re.search(r"\((\d+)\)", str(v or ""))
              if m:
                  pid = m.group(1)
                  break
          r["pid"] = pid
      return rows
