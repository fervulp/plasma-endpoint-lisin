name: event_session
id: LS-E-22
type: enrichment
version: 1.0.0
title: Session and startup around the event
# КОНТЕКСТ СОБЫТИЯ: в каком запуске системы оно произошло и был ли в это
# время кто-то в системе. Одно и то же действие читается по-разному, когда
# за машиной сидел пользователь и когда она стояла без сеанса.
# Границы берём из состояния (таблицы boot_sessions и logins) — то есть из
# того же конвейера, а не отдельным опросом системы.
code: |
  import sqlite3
  from pathlib import Path

  _CACHE = {}

  def _load():
      boots, sessions = [], []
      try:
          con = sqlite3.connect("file:%s?mode=ro" % (Path.home() /
                                ".local/share/lisin/state.db"), uri=True)
          try:
              for bid, st, en in con.execute(
                      "SELECT boot_id, started, ended FROM boot_sessions "
                      "WHERE kind = 'boot' AND started <> ''"):
                  boots.append((st or "", en or "", bid or ""))
          except Exception:
              pass
          try:
              for user, frm, start, end in con.execute(
                      "SELECT user, host, start, until FROM logins"):
                  if start:
                      sessions.append((start, end or "", user or "", frm or ""))
          except Exception:
              pass
          con.close()
      except Exception:
          pass
      boots.sort()
      # У ТЕКУЩЕГО ЗАПУСКА КОНЦА НЕТ. journalctl отдаёт «последнюю запись»,
      # и она отстаёт от реального времени — по ней свежие события выпадали
      # из своего же запуска.
      if boots:
          last = boots[-1]
          boots[-1] = (last[0], "", last[2])
      sessions.sort()
      return boots, sessions

  def _find(spans, ts):
      # последний промежуток, начавшийся не позже события
      hit = None
      for span in spans:
          if span[0] <= ts and (not span[1] or span[1] >= ts):
              hit = span
      return hit

  def enrich(rows):
      # границы читаем заново на каждый прогон: сеанс мог начаться минуту назад
      boots, sessions = _load()
      for r in rows:
          ts = str(r.get("ts") or "")[:19].replace("Z", "")
          if not ts:
              continue
          b = _find(boots, ts)
          if b:
              r["boot_id"] = b[2]
              r["boot_at"] = b[0]
          s = _find(sessions, ts)
          if s:
              r["session_user"] = s[2]
              r["session_from"] = s[3]
              r["session_started"] = s[0]
      return rows
