name: event_session
id: LS-E-22
type: enrichment
version: 1.0.0
title: Session and startup around the event
code: "import sqlite3\nfrom pathlib import Path\n\n_CACHE = {}\n\ndef _load():\n    boots, sessions =\
  \ [], []\n    try:\n        con = sqlite3.connect(\"file:%s?mode=ro\" % (Path.home() /\n           \
  \                   \".local/share/lisin/state.db\"), uri=True)\n        try:\n            for bid,\
  \ st, en in con.execute(\n                    \"SELECT boot_id, started, ended FROM boot_sessions \"\
  \n                    \"WHERE kind = 'boot' AND started <> ''\"):\n                boots.append((st\
  \ or \"\", en or \"\", bid or \"\"))\n        except Exception:\n            pass\n        try:\n  \
  \          for user, frm, start, end in con.execute(\n                    \"SELECT user, host, start,\
  \ until FROM logins\"):\n                if start:\n                    sessions.append((start, end\
  \ or \"\", user or \"\", frm or \"\"))\n        except Exception:\n            pass\n        con.close()\n\
  \    except Exception:\n        pass\n    boots.sort()\n    # THE CURRENT BOOT HAS NO END. journalctl\
  \ returns \"the last record\",\n    # and it lags behind real time - by it fresh events fell out of\
  \ their\n    # own boot.\n    if boots:\n        last = boots[-1]\n        boots[-1] = (last[0], \"\"\
  , last[2])\n    sessions.sort()\n    return boots, sessions\n\ndef _find(spans, ts):\n    # the last\
  \ interval that started no later than the event\n    hit = None\n    for span in spans:\n        if\
  \ span[0] <= ts and (not span[1] or span[1] >= ts):\n            hit = span\n    return hit\n\ndef enrich(rows):\n\
  \    # the boundaries are re-read on every run: a session may have started a minute ago\n    boots,\
  \ sessions = _load()\n    for r in rows:\n        ts = str(r.get(\"ts\") or \"\")[:19].replace(\"Z\"\
  , \"\")\n        if not ts:\n            continue\n        b = _find(boots, ts)\n        if b:\n   \
  \         r[\"boot_id\"] = b[2]\n            r[\"boot_at\"] = b[0]\n        s = _find(sessions, ts)\n\
  \        if s:\n            r[\"session_user\"] = s[2]\n            r[\"session_from\"] = s[3]\n   \
  \         r[\"session_started\"] = s[0]\n    return rows\n"
