name: mount_access
id: LS-E-19
type: enrichment
version: 1.0.0
title: Mount writability and exec policy
# It lets a finding rule do without a list of paths: the danger is derived from
# facts (who can write + whether execution is allowed), not from a name.
code: |
  def enrich(rows):
      """Who can write to a mount point and whether things can be run from it.

      It is needed so that the "directories without noexec" rule contains no list of
      paths (/tmp, /home, ...). Such a list is wrong on any other partitioning:
      someone has a separate /srv, someone has no /home. The property must be
      structural: it is dangerous where an UNPRIVILEGED user can write a file and
      immediately run it. The CIS Benchmark states the same requirement for
      partitions holding user data.
      """
      import os
      import stat
      for r in rows:
          t = str(r.get("target") or "")
          opts = str(r.get("options") or "")
          w_all = w_me = ""
          try:
              st = os.stat(t)
              if st.st_mode & stat.S_IWOTH:
                  w_all = "yes"
              if os.access(t, os.W_OK):
                  w_me = "yes"
          except OSError:
              pass
          r["world_writable"] = w_all
          r["user_writable"] = w_me
          r["noexec"] = "yes" if "noexec" in opts else ""
          r["nosuid"] = "yes" if "nosuid" in opts else ""
          # THE RISK comes from facts, not from the directory name: anyone can
          # write and execution from there is allowed
          r["exec_risk"] = "yes" if (w_all or w_me) and "noexec" not in opts else ""
      return rows
