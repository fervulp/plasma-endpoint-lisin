name: mount_access
id: LS-E-19
type: enrichment
version: 1.0.0
title: Mount writability and exec policy
# Позволяет правилу находки обойтись без списка путей: опасность выводится
# из фактов (кто может писать + разрешено ли исполнение), а не из имени.
code: |
  def enrich(rows):
      """Кто может писать в точку монтирования и можно ли оттуда запускать.

      Нужно, чтобы правило «каталоги без noexec» не содержало списка путей
      (/tmp, /home, ...). Список неверен на любой другой разметке: у кого-то
      отдельный /srv, у кого-то нет /home. Признак должен быть структурным:
      опасно там, куда НЕПРИВИЛЕГИРОВАННЫЙ пользователь может записать файл
      и тут же его запустить. Это же требование формулирует CIS Benchmark
      для разделов с пользовательскими данными.
      """
      import os
      import stat
      for r in rows:
          t = str(r.get("target") or "")
          opts = str(r.get("options") or "")
          w_all = w_me = ""
          try:
              st = os.stat(t)
              if st.st_mode & stat.S_IWOTH:
                  w_all = "yes"
              if os.access(t, os.W_OK):
                  w_me = "yes"
          except OSError:
              pass
          r["world_writable"] = w_all
          r["user_writable"] = w_me
          r["noexec"] = "yes" if "noexec" in opts else ""
          r["nosuid"] = "yes" if "nosuid" in opts else ""
          # РИСК — из фактов, а не из имени каталога: писать может кто угодно
          # и запускать оттуда разрешено
          r["exec_risk"] = "yes" if (w_all or w_me) and "noexec" not in opts else ""
      return rows
