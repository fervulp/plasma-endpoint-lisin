name: port_owner_cmdline
id: LS-E-23
type: enrichment
version: 1.0.0
title: Recover socket owner from the process command line
# ss shows the owner only for our own processes. A connection of a daemon running
# as another user is left without an owner. If the remote address stands in the
# command line of a process as a separate argument, that process is the owner.
# The property is structural, no program names.
code: |
  def enrich(rows):
      """Recover the owner of a socket when ss did not show it.

      ss prints users:(...) only for OUR OWN processes. A connection of a daemon
      running as another user (a VPN client under its own service account, a
      service under root) is present in the snapshot but the owner is empty - and
      "who opened this connection" had no answer.

      The property is STRUCTURAL, not a list of names: if the remote address of a
      connection occurs in the COMMAND LINE of a process (a client is given the
      server address as an argument: --remote, -H, host:port), then that process is
      the owner. It works for any program given the destination explicitly.

      The guess is marked: process_source = "matched by command line", so that an
      exact match is distinguished from a probable one.
      """
      import sqlite3
      from pathlib import Path

      need = [r for r in rows
              if not str(r.get("process") or "").strip()
              and str(r.get("remote") or "").strip()
              and "*" not in str(r.get("remote"))]
      if not need:
          return rows

      procs = []
      try:
          db = Path.home() / ".local/share/lisin/state.db"
          con = sqlite3.connect("file:%s?mode=ro" % db, uri=True)
          procs = [(str(p), str(c or "")) for p, c in
                   con.execute("SELECT pid, command FROM processes "
                               "WHERE command NOT LIKE '[%'")]
          con.close()
      except Exception:
          return rows

      for r in need:
          host = str(r["remote"]).rsplit(":", 1)[0]
          port = str(r["remote"]).rsplit(":", 1)[-1]
          if not host or host in ("0.0.0.0", "::", "127.0.0.1"):
              continue
          for pid, cmd in procs:
              # the address must stand in the command as a separate argument,
              # otherwise "192.0.2.1" would match "192.0.2.10"
              toks = cmd.replace("=", " ").replace(":", " ").split()
              if host not in toks:
                  continue
              # the port in the command is a confirmation, not a requirement
              name = cmd.split()[0].rsplit("/", 1)[-1]
              r["process"] = "%s (%s)" % (name, pid)
              r["owner_cmd"] = cmd[:200]
              r["pid"] = pid
              r["process_source"] = ("matched by command line"
                                     + (" (port confirmed)" if port in toks else ""))
              break
      return rows
