name: proc_purpose
id: LS-E-22
type: enrichment
version: 4.0.0
title: What a process is and what it is for
# WHAT A PROCESS IS AND WHAT IT IS FOR, from the system and not from a list of
# names: the purpose of a process is the description of the package its binary
# belongs to.
#
# VERSION 4: no commands and no /proc reading here any more. The binary is
# resolved by the processes input (the exe column), the file index comes from
# the package_files flow and the descriptions from package_meta. An enrichment
# links what has already been collected (principle 1).
code: |
  _CACHE = {}


  def _lookup(table, key_col, val_col):
      """{key: value} from a state table, cached by the mtime of the database."""
      import os
      import sqlite3
      from pathlib import Path
      db = str(Path.home() / ".local/share/lisin/state.db")
      try:
          sig = os.path.getmtime(db)
      except OSError:
          sig = 0
      name = table + ":" + val_col
      hit = _CACHE.get(name)
      if hit and hit[0] == sig:
          return hit[1]
      out = {}
      try:
          con = sqlite3.connect("file:%s?mode=ro" % db, uri=True, timeout=5)
          for k, v in con.execute(
                  'SELECT "%s", "%s" FROM "%s"' % (key_col, val_col, table)):
              if k:
                  out[k] = v or ""
          con.close()
      except Exception:
          pass
      _CACHE[name] = (sig, out)
      return out


  def enrich(rows):
      import os
      import re
      idx = _lookup("package_files", "path", "package")
      purpose = _lookup("package_meta", "name", "purpose")
      summary = _lookup("package_meta", "name", "summary")
      if not idx:
          return rows

      def describe(pkg):
          return purpose.get(pkg, "") or summary.get(pkg, "")

      for r in rows:
          cmd = str(r.get("command") or "").strip()
          if not cmd:
              continue
          if cmd.startswith("["):
              r["title"] = "kernel thread"
              r["purpose"] = "Linux kernel internal task"
              r["package"] = ""
              continue

          exe = str(r.get("exe") or "")
          if not exe or exe not in idx:
              # The binary of a foreign process is not readable without root, and
              # some processes REWRITE their own command line:
              # "sshd: /usr/sbin/sshd -D [listener]" - the first word there is
              # "sshd:", and parsing by it produced an empty package.
              # We take the first word that looks like a path AND is known to the
              # package index: the property is structural, no lists of names.
              for tok in cmd.replace(":", " ").split():
                  if not tok.startswith("/"):
                      continue
                  # /usr/sbin is a symlink to /usr/bin (the merged /usr), and the
                  # package records the file as /usr/bin/sshd while the process
                  # shows /usr/sbin/sshd. We also check the resolved path.
                  if tok in idx:
                      exe = tok
                      break
                  try:
                      real = os.path.realpath(tok)
                  except OSError:
                      real = ""
                  if real and real in idx:
                      exe = real
                      break
              if not exe:
                  tok = cmd.split(None, 1)[0]
                  exe = tok if tok.startswith("/") else ""

          # UNWRAPPING THE INTERPRETER. tuned runs as "python3 -Es /usr/sbin/tuned"
          # - the exe is python3, and the process was labelled "python3", although
          # it is the tuned daemon. The script matters more than the interpreter:
          # if the exe is a language interpreter, we look in the command for a PATH
          # ARGUMENT known to the package index and take ITS package. The set of
          # interpreters is a fact of the method (like /etc/shells for shells), not
          # a list of "bad names".
          INTERP = ("python", "python2", "python3", "perl", "ruby", "node",
                    "php", "bash", "sh", "dash", "zsh", "java", "mono")
          base = exe.rsplit("/", 1)[-1] if exe else ""
          base = re.sub(r"[0-9.]+$", "", base)
          if base in INTERP:
              for tok in cmd.split()[1:]:
                  if not tok.startswith("/") or tok == exe:
                      continue
                  cand = tok if tok in idx else (
                      os.path.realpath(tok) if os.path.exists(tok) else "")
                  if cand and cand in idx:
                      exe = cand      # this is the script - the essence of the process
                      break

          pkg = idx.get(exe, "")
          if not pkg and exe:
              try:
                  pkg = idx.get(os.path.realpath(exe), "")
              except OSError:
                  pkg = ""
          r["package"] = pkg
          r["title"] = pkg
          r["purpose"] = describe(pkg) if pkg else ""
      return rows
