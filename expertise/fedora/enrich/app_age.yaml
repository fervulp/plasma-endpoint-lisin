name: app_age
id: LS-E-9
type: enrichment
version: 1.0.0
title: Package age
# THE AGE OF THE INSTALLATION. A package installed today is more interesting than
# one that has been there for two years: a fresh install next to an incident is a lead.
# We count the days from the installation date, inventing nothing.
code: |
  def enrich(rows):
      import datetime
      now = datetime.datetime.now()
      for r in rows:
          s = str(r.get("installed") or "").strip()
          r["age_days"] = ""
          r["recent"] = ""
          if not s:
              continue
          for fmt in ("%Y-%m-%d %H:%M", "%Y-%m-%d %H:%M:%S", "%Y-%m-%d"):
              try:
                  d = datetime.datetime.strptime(s[:len(fmt) + 2].strip(), fmt)
              except ValueError:
                  continue
              days = (now - d).days
              r["age_days"] = str(days)
              r["recent"] = "yes" if days <= 7 else ""
              break
      return rows
