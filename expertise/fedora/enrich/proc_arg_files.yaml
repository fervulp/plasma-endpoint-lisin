name: proc_arg_files
id: LS-E-24
type: enrichment
version: 1.0.0
title: Files given to the process on its command line
# Without root one cannot read /proc/<pid>/fd of a foreign process, and "which
# config does it use" had no answer. The command line is always visible, and the
# paths in it are explicit. We take the path arguments that exist on disk.
# The property is structural: no program names and no option names.
code: |
  def enrich(rows):
      """The files GIVEN to a process as a command line argument.

      For a daemon running as another user /proc/<pid>/fd cannot be read without
      root, and "which config does it use" had no answer. But the command line of a
      process is always visible, and the paths in it are explicit: --config, --ca,
      --cert, --key, -f /etc/... We take EVERY argument that looks like a path and
      keep those that ACTUALLY exist on disk.

      The property is structural: no program names and no lists of options - only
      "the argument is an existing file". It works for any program that was given
      a file explicitly.
      """
      import os
      for r in rows:
          cmd = str(r.get("command") or "")
          if not cmd or cmd.startswith("["):
              r["arg_files"] = ""
              continue
          out, seen = [], set()
          for tok in cmd.replace("=", " ").split():
              if not tok.startswith("/") or tok in seen:
                  continue
              seen.add(tok)
              # the binary itself is not a config: the package shows it
              if tok == cmd.split()[0]:
                  continue
              try:
                  if os.path.isfile(tok):
                      out.append(tok)
              except OSError:
                  pass
              if len(out) >= 12:
                  break
          r["arg_files"] = ", ".join(out)
      return rows
