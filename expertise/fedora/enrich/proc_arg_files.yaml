name: proc_arg_files
id: LS-E-24
type: enrichment
version: 1.0.0
title: Files given to the process on its command line
# Без root нельзя прочитать /proc/<pid>/fd чужого процесса, и «с каким
# конфигом он работает» оставалось без ответа. Команда видна всегда, а пути
# в ней указаны явно. Берём аргументы-пути, которые существуют на диске.
# Признак структурный: никаких имён программ и ключей.
code: |
  def enrich(rows):
      """Файлы, которые процессу ЗАДАЛИ аргументом командной строки.

      У демона под другим пользователем /proc/<pid>/fd не читается без root,
      и «с каким конфигом он работает» ответа не имело. Но команда процесса
      видна всегда, а в ней пути указаны явно: --config, --ca, --cert, --key,
      -f /etc/... Берём КАЖДЫЙ аргумент, похожий на путь, и оставляем те,
      которые РЕАЛЬНО существуют на диске.

      Признак структурный: никаких имён программ и списков ключей — только
      «аргумент является существующим файлом». Работает для любой программы,
      которой файл передали явно.
      """
      import os
      for r in rows:
          cmd = str(r.get("command") or "")
          if not cmd or cmd.startswith("["):
              r["arg_files"] = ""
              continue
          out, seen = [], set()
          for tok in cmd.replace("=", " ").split():
              if not tok.startswith("/") or tok in seen:
                  continue
              seen.add(tok)
              # сам бинарник не конфиг: его показывает пакет
              if tok == cmd.split()[0]:
                  continue
              try:
                  if os.path.isfile(tok):
                      out.append(tok)
              except OSError:
                  pass
              if len(out) >= 12:
                  break
          r["arg_files"] = ", ".join(out)
      return rows
