name: port_process
id: LS-E-1
type: enrichment
version: 1.0.0
title: Port -> process
# The link: in ports the process field is "sshd (1234)". We extract the PID, look
# it up in the processes table and add the command and the user of the port owner.
lookup_table: processes
lookup_key: pid
from_field: process
extract: '\((\d+)\)'
add:
  owner_cmd: command
  owner_user: user
