name: port_purpose
id: LS-E-5
type: enrichment
version: 2.0.0
title: Port meaning (from /etc/services + owning package)
# WHAT A PORT IS AND WHAT FOR - FROM THE SYSTEM, without a hand-written port list.
# Source 1: /etc/services (11 thousand lines) - the official service name and the
#   IANA comment for the port.
# Source 2: the package of the process that actually listens on the port - its
#   description says WHY the port is open here (the proc_purpose enrichment has
#   already put the description into processes, here we read it from the state database).
# We do not invent the risk: it follows from WHERE the socket faces (exposure) and
# whether the address is private - that is a fact, not an opinion.
code: |
  def enrich(rows):
      import sqlite3
      from pathlib import Path

      # 1) /etc/services: (port, protocol) -> (name, comment)
      svc = {}
      try:
          for ln in open("/etc/services", errors="replace"):
              ln = ln.strip()
              if not ln or ln.startswith("#"):
                  continue
              body, _, comment = ln.partition("#")
              f = body.split()
              if len(f) < 2 or "/" not in f[1]:
                  continue
              port, proto = f[1].split("/", 1)
              svc.setdefault((port, proto.strip()), (f[0], comment.strip()))
      except OSError:
          pass

      # 2) the package description of the owning process (put there by proc_purpose)
      owner = {}
      try:
          db = Path.home() / ".local/share/lisin/state.db"
          con = sqlite3.connect("file:%s?mode=ro" % db, uri=True)
          con.row_factory = sqlite3.Row
          for r in con.execute("SELECT pid, purpose, package FROM processes"):
              if r["purpose"]:
                  owner[str(r["pid"])] = (r["package"] or "", r["purpose"])
          con.close()
      except Exception:
          pass

      for r in rows:
          local = str(r.get("local") or "")
          port = str(r.get("port") or "") or (local.rsplit(":", 1)[-1] if ":" in local else "")
          proto = str(r.get("proto") or "").replace("6", "")
          name, comment = svc.get((port, proto), ("", ""))
          r["service"] = name
          # whose port it actually is matters more than a dictionary description
          m = re.search(r"\((\d+)\)\s*$", str(r.get("process") or ""))
          own = owner.get(m.group(1)) if m else None
          # IMPORTANT: the name from /etc/services is reliable only for well-known
          # ports (<1024). For 15000 the registry says "hydap" although our own
          # process listens there - such a "purpose" is worse than an empty one. So
          # we take the purpose either from the real owner or from IANA for
          # well-known ports, otherwise we leave it empty and invent nothing.
          try:
              pnum = int(port)
          except (TypeError, ValueError):
              pnum = 0
          if own:
              r["service_purpose"] = own[1]
          elif pnum < 1024:
              r["service_purpose"] = comment
          else:
              r["service_purpose"] = ""
          # the risk comes from the fact of exposure, not from an opinion about the port number
          exp = str(r.get("exposure") or "")
          if exp.startswith("OPEN"):
              r["service_risk"] = "high"
          elif "filtered" in exp:
              r["service_risk"] = "medium"
          elif "local-only" in exp:
              r["service_risk"] = "low"
          else:
              r["service_risk"] = ""
      return rows
