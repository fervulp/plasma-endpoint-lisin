name: event_process_link
id: LS-E-23
type: enrichment
version: 1.0.0
title: Link the event to a process
# AN EVENT IS LINKED TO A PROCESS AT INGEST, not at display time.
# The interface used to compare the pid of an event with the live processes every
# time it showed the feed: that is work per view and only for the processes that
# are STILL alive. Here the link is written into the event itself once:
#   * there is a pid - we add the name, the path and the user from the state;
#   * there is no pid - we look for it by the process name, by the binary path or
#     by the socket (address:port from the event against the socket table), and if
#     exactly ONE candidate is found we record it; the method is stored in
#     process_source so that a guess is not passed off as a fact.
code: |
  import sqlite3
  from pathlib import Path

  def _load():
      by_pid, by_name, by_sock = {}, {}, {}
      try:
          con = sqlite3.connect("file:%s?mode=ro" % (Path.home() /
                                ".local/share/lisin/state.db"), uri=True)
          con.row_factory = sqlite3.Row
          try:
              for r in con.execute("SELECT pid, command, user, package FROM processes"):
                  pid = str(r["pid"] or "").strip()
                  cmd = str(r["command"] or "")
                  if not pid:
                      continue
                  by_pid[pid] = {"command": cmd, "user": str(r["user"] or ""),
                                 "package": str(r["package"] or "")}
                  exe = cmd.split(" ")[0]
                  base = exe.rsplit("/", 1)[-1]
                  for key in (exe, base):
                      if key:
                          by_name.setdefault(key, set()).add(pid)
          except sqlite3.Error:
              pass
          try:
              # socket -> process: the event has a destination address and port
              for r in con.execute("SELECT remote, local, pid FROM ports"):
                  pid = str(r["pid"] or "").strip()
                  if not pid:
                      continue
                  for a in (str(r["remote"] or ""), str(r["local"] or "")):
                      if a:
                          by_sock.setdefault(a, set()).add(pid)
          except sqlite3.Error:
              pass
          con.close()
      except Exception:
          pass
      return by_pid, by_name, by_sock

  def enrich(rows):
      by_pid, by_name, by_sock = _load()

      def one(pids):
          """We accept a link only if there is exactly ONE candidate: otherwise it is a guess."""
          return next(iter(pids)) if pids and len(pids) == 1 else ""

      for r in rows:
          pid = str(r.get("process_pid") or "").strip()
          if not pid:
              # look by the process name/path from the event itself
              for f in ("process_executable", "process_name", "object_name"):
                  v = str(r.get(f) or "").strip()
                  if not v:
                      continue
                  cand = one(by_name.get(v) or by_name.get(v.rsplit("/", 1)[-1]))
                  if cand:
                      pid = cand
                      r["process_pid"] = pid
                      r["process_source"] = "matched by name"
                      break
          if not pid:
              # look by the socket of the event
              dst = str(r.get("destination_ip") or "")
              dpt = str(r.get("destination_port") or "")
              key = "%s:%s" % (dst, dpt) if dst and dpt else ""
              cand = one(by_sock.get(key)) if key else ""
              if cand:
                  pid = cand
                  r["process_pid"] = pid
                  r["process_source"] = "matched by socket"
          if not pid:
              continue
          info = by_pid.get(pid)
          # IS THE PROCESS ALIVE - we record it right away: the interface will not
          # have to compare with the snapshot on every render of the feed
          r["process_alive"] = "yes" if info else "no"
          if not info:
              continue
          if not str(r.get("process_executable") or "").strip():
              r["process_executable"] = info["command"].split(" ")[0]
          if not str(r.get("process_name") or "").strip():
              r["process_name"] = info["command"].split(" ")[0].rsplit("/", 1)[-1]
          if not str(r.get("user_name") or "").strip() and info["user"]:
              r["user_name"] = info["user"]
          if not str(r.get("package_name") or "").strip() and info["package"]:
              r["package_name"] = info["package"]
      return rows
