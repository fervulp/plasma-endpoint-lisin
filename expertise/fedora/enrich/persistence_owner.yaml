name: persistence_owner
id: LS-E-31
type: enrichment
version: 2.0.0
title: Owner of an autostart mechanism
# The owner of an autostart mechanism file: a package or nobody.
#
# It replaces a rule like `vector LIKE '%preload%'`. The name of a mechanism
# says nothing about whether it is legitimate: ld.so.conf.d is full of files
# from packages. The real property is a MISMATCH: the file lies in a system
# autostart mechanism but no package installed it. Such a file appeared by
# hand, and that is the one to look at.
#
# VERSION 2: the rpm call moved out of here into the package_files flow
# (principle 1). This is now a plain lookup.
code: |
  # A SHARED LOOKUP IN THE STATE TABLES, WITHOUT A SINGLE COMMAND.
  # The index is collected by its own flow (fedora/inputs/package_files), so the
  # source is visible in the pipeline, can be switched off and can be run by
  # hand. An enrichment only links what has already been collected (principle 1).
  _CACHE = {}


  def _lookup(table, key_col, val_col):
      """{key: value} from a state table, cached by the mtime of the database."""
      import os
      import sqlite3
      from pathlib import Path
      db = str(Path.home() / ".local/share/lisin/state.db")
      try:
          sig = os.path.getmtime(db)
      except OSError:
          sig = 0
      name = table + ":" + val_col
      hit = _CACHE.get(name)
      if hit and hit[0] == sig:
          return hit[1]
      out = {}
      try:
          con = sqlite3.connect("file:%s?mode=ro" % db, uri=True, timeout=5)
          for k, v in con.execute(
                  'SELECT "%s", "%s" FROM "%s"' % (key_col, val_col, table)):
              if k:
                  out[k] = v or ""
          con.close()
      except Exception:
          pass
      _CACHE[name] = (sig, out)
      return out


  def enrich(rows):
      import os
      idx = _lookup("package_files", "path", "package")
      for r in rows:
          path = str(r.get("path") or "")
          pkg = idx.get(path, "") if path else ""
          if not pkg and path:
              try:
                  pkg = idx.get(os.path.realpath(path), "")
              except OSError:
                  pkg = ""
          r["package"] = pkg
          # a system path with no package = installed bypassing the package manager
          under_system = path.startswith(("/etc/", "/usr/", "/lib", "/opt/"))
          r["unpackaged"] = "yes" if (path and not pkg and under_system) else ""
      return rows
