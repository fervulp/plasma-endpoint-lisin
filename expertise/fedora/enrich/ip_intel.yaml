name: ip_intel
id: LS-E-2
type: enrichment
version: 1.0.0
title: IP → ASN / owner / country / rDNS
code: "def enrich(rows):\n    from agent import ipintel\n    ips = []\n    for r in rows:\n        ip\
  \ = r.get(\"destination_ip\") or \"\"\n        if ip:\n            ips.append(ip)\n    if not ips:\n\
  \        return rows\n    info = ipintel.lookup_many(ips)\n    for r in rows:\n        d = info.get(r.get(\"\
  destination_ip\") or \"\")\n        if not d:\n            continue\n        if d.get(\"as_number\"\
  ):\n            r[\"destination_as_number\"] = d[\"as_number\"]\n        if d.get(\"as_org\"):\n   \
  \         r[\"destination_as_org\"] = d[\"as_org\"]\n        if d.get(\"country\"):\n            r[\"\
  destination_geo_country\"] = d[\"country\"]\n        if d.get(\"rdns\") and not r.get(\"destination_domain\"\
  ):\n            r[\"destination_domain\"] = d[\"rdns\"]\n        # a private address is a useful fact\
  \ too, we mark it explicitly\n        if d.get(\"scope\") == \"private\" and not r.get(\"destination_as_org\"\
  ):\n            r[\"destination_as_org\"] = \"(private network)\"\n    return rows\n"
