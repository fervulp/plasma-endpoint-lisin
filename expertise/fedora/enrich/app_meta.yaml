name: app_meta
id: LS-E-25
type: enrichment
version: 2.0.0
title: What an application is and what it is for
# WHAT THIS APPLICATION IS AND WHAT IT IS FOR.
# The inventory only answered "name + version", from which one cannot tell what
# the package is and whether it can be touched. Here we add:
#   category - the category (from the .desktop Categories, otherwise rpm Group);
#   purpose  - a human description (the .desktop Comment - it is clearer than
#              the rpm Summary: "New era of messaging" instead of a package name);
#   url      - the project site, so that one can look it up.
#
# VERSION 2: the rpm calls and the .desktop reading moved out of here into the
# package_meta flow (principle 1: collecting is the job of an input). This is
# now a join by package name.
code: |
  # A SHARED LOOKUP IN THE STATE TABLES, WITHOUT A SINGLE COMMAND.
  # The index is collected by its own flow (fedora/inputs/package_files), so the
  # source is visible in the pipeline, can be switched off and can be run by
  # hand. An enrichment only links what has already been collected (principle 1).
  _CACHE = {}


  def _lookup(table, key_col, val_col):
      """{key: value} from a state table, cached by the mtime of the database."""
      import os
      import sqlite3
      from pathlib import Path
      db = str(Path.home() / ".local/share/lisin/state.db")
      try:
          sig = os.path.getmtime(db)
      except OSError:
          sig = 0
      name = table + ":" + val_col
      hit = _CACHE.get(name)
      if hit and hit[0] == sig:
          return hit[1]
      out = {}
      try:
          con = sqlite3.connect("file:%s?mode=ro" % db, uri=True, timeout=5)
          for k, v in con.execute(
                  'SELECT "%s", "%s" FROM "%s"' % (key_col, val_col, table)):
              if k:
                  out[k] = v or ""
          con.close()
      except Exception:
          pass
      _CACHE[name] = (sig, out)
      return out


  def enrich(rows):
      purpose = _lookup("package_meta", "name", "purpose")
      summary = _lookup("package_meta", "name", "summary")
      url = _lookup("package_meta", "name", "url")
      category = _lookup("package_meta", "name", "category")
      group = _lookup("package_meta", "name", "group")
      if not summary and not purpose:
          return rows
      for r in rows:
          nm = str(r.get("name") or "")
          r["category"] = category.get(nm, "") or group.get(nm, "")
          # the human description first, the package summary as a fallback
          r["purpose"] = purpose.get(nm, "") or summary.get(nm, "")
          r["url"] = url.get(nm, "")
      return rows
